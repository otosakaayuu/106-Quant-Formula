{id:'pendle',ch:5,year:2024,who:'TN Lee',name:'Pendle Yield Tokenization',
  desc:'Memisahkan aset menjadi Principal Token (PT, mendapat nilai pokok di jatuh tempo) dan Yield Token (YT, mendapat semua yield dari aset hingga jatuh tempo).',
  tex:'PT+YT=\\text{Underlying Value},\\quad YT\\approx\\frac{Y}{r-g}',
  vars:[{k:'underlying',label:'Nilai Underlying (per token)',min:100,max:10000,step:10,def:3500,unit:'$'},{k:'yieldRate',label:'Yield Rate Saat Ini',min:1,max:30,step:0.5,def:8,unit:'%/th'},{k:'T',label:'Waktu ke Jatuh Tempo (th)',min:0.1,max:2,step:0.05,def:0.5,unit:''}],
  calc(v){
    const ytValue=v.underlying*(1-Math.exp(-v.yieldRate/100*v.T));
    const ptValue=v.underlying-ytValue;
    const impliedYield=-Math.log(ptValue/v.underlying)/v.T*100;
    return {big:fmtNum(ptValue,2),bigUnit:'$',bigLabel:'Harga PT (Principal Token)',
      subs:[{l:'Harga YT (Yield Token)',v:fmtNum(ytValue,2)+'$'},{l:'Implied APY dari PT',v:fmtNum(impliedYield,2)+'%'}],
      note:{type:'info',text:'PT cocok untuk investor yang ingin "fix yield" — membeli PT di bawah par dan menahan hingga jatuh tempo menjamin yield pasti (mirip zero-coupon bond).'},
      chart:{mode:'bars',decimals:2,unit:'$',bars:[{label:'PT (Pokok)',value:ptValue,color:COLORS.amber},{label:'YT (Yield Future)',value:ytValue,color:COLORS.cyan},{label:'Underlying Total',value:v.underlying,color:COLORS.faint}]}}
  }
},
{id:'intent-trading',ch:5,year:2024,who:'CowSwap / UniswapX',name:'Intent-Based Trading',
  desc:'Paradigma perpindahan beban eksekusi ke Solver kompetitif — user menyatakan "niat" (intent) bukan rute spesifik, solver mencari eksekusi terbaik dan bersaing memenangkan order.',
  tex:'\\text{Solver wins}=\\arg\\max_{s}(\\text{output}_s - \\text{SolverCost}_s)',
  vars:[{k:'inputAmt',label:'Input Token (USDC)',min:100,max:1000000,step:100,def:10000,unit:'$'},{k:'bestSolver',label:'Output Solver Terbaik (ETH eq.)',min:0.01,max:1000,step:0.1,def:2.85,unit:''},{k:'worstSolver',label:'Output Solver Terburuk (ETH eq.)',min:0.01,max:1000,step:0.1,def:2.78,unit:''},{k:'onchainAMM',label:'Output AMM Langsung (ETH eq.)',min:0.01,max:1000,step:0.1,def:2.80,unit:''}],
  calc(v){
    const improvement=(v.bestSolver/v.onchainAMM-1)*100;
    const solverSpread=(v.bestSolver-v.worstSolver)/v.bestSolver*100;
    return {big:fmtNum(improvement,3),bigUnit:'%',bigLabel:'Surplus vs AMM Langsung',
      subs:[{l:'Output Terbaik (Solver)',v:fmtNum(v.bestSolver,4)+' ETH'},{l:'Output AMM (baseline)',v:fmtNum(v.onchainAMM,4)+' ETH'},{l:'Spread Antar Solver',v:fmtNum(solverSpread,3)+'%'}],
      note:{type: improvement>0.5?'good':'info',text: improvement>0.5?'Solver kompetitif memberikan eksekusi lebih baik dari AMM langsung — "price improvement" nyata bagi pengguna.':'Kompetisi solver minimal pada ukuran order ini — mungkin kembali ke AMM direct lebih efisien.'},
      chart:{mode:'bars',decimals:4,unit:' ETH',bars:[{label:'Solver Terbaik',value:v.bestSolver,color:COLORS.green},{label:'AMM Langsung',value:v.onchainAMM,color:COLORS.amber},{label:'Solver Terburuk',value:v.worstSolver,color:COLORS.red}]}}
  }
},
{id:'hyperliquid',ch:5,year:2024,who:'Hyperliquid Devs',name:'Hyperliquid Order Book (L1)',
  desc:'Order book on-chain pertama yang beroperasi di L1 monolitik sendiri dengan throughput institusional — menggabungkan kecepatan CEX dengan keamanan on-chain.',
  tex:'P_{fill}=\\arg\\min_{ask}(ask\\geq P_{bid})',
  vars:[{k:'bid',label:'Best Bid',min:10000,max:100000,step:1,def:60000,unit:'$'},{k:'ask',label:'Best Ask',min:10000,max:100000,step:1,def:60010,unit:'$'},{k:'bidDepth',label:'Depth Bid (total USD)',min:1000,max:1000000,step:1000,def:200000,unit:'$'},{k:'askDepth',label:'Depth Ask (total USD)',min:1000,max:1000000,step:1000,def:180000,unit:'$'},{k:'tradeSize',label:'Ukuran Order Market',min:100,max:500000,step:100,def:50000,unit:'$'}],
  calc(v){
    const spread=v.ask-v.bid;
    const spreadBps=spread/v.bid*10000;
    const impact=v.tradeSize/v.askDepth*spreadBps;
    const imbalance=(v.bidDepth-v.askDepth)/(v.bidDepth+v.askDepth)*100;
    return {big:fmtNum(spreadBps,2),bigUnit:' bps',bigLabel:'Bid-Ask Spread',
      subs:[{l:'Spread (USD)',v:fmtNum(spread,1)+'$'},{l:'Price Impact Estimasi',v:fmtNum(impact,2)+' bps'},{l:'Order Book Imbalance',v:fmtNum(imbalance,1)+'%'}],
      note:{type: imbalance>30?'good':imbalance<-30?'warn':'info',text: imbalance>30?'Bid lebih dalam dari ask: tekanan beli lebih kuat — sinyal bullish jangka sangat pendek.':imbalance<-30?'Ask lebih dalam: tekanan jual lebih besar — sinyal bearish intraday.':'Order book relatif seimbang — tidak ada sinyal arah kuat dari depth.'},
      chart:{mode:'bars',decimals:0,unit:'$',bars:[{label:'Bid Depth',value:v.bidDepth,color:COLORS.green},{label:'Ask Depth',value:v.askDepth,color:COLORS.red}]}}
  }
}
]);


/* =========================================================
   QUANT CODEX — UI ENGINE
   ========================================================= */
let activeId=null, currentSeed=(Date.now()&0xffffff), chartInst=null, searchQ='';

function $(id){return document.getElementById(id);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function chColorKey(ch){return ({1:'amber',2:'red',3:'green',4:'cyan',5:'violet'})[ch]||'amber';}
function chColor(ch){return COLORS[chColorKey(ch)];}
function chIcon(ch){return ({1:'💎',2:'⚡',3:'📊',4:'🌍',5:'🔮'})[ch]||'•';}

/* ---------- ticker ---------- */
function buildTicker(){
  const html=FORMULAS.map(f=>`<span class="tick-item" onclick="selectFormula('${f.id}')"><b>${f.year}</b>&nbsp;${esc(f.name)}</span>`).join('');
  $('tickerTrack').innerHTML=html+html;
}

/* ---------- sidebar ---------- */
function buildSidebar(){
  const q=searchQ.trim().toLowerCase();
  let html='';
  let totalShown=0;
  CHAPTER_META.forEach(ch=>{
    const fms=FORMULAS.filter(f=>f.ch===ch.id && (!q || (f.name+' '+f.who+' '+f.year+' '+f.id).toLowerCase().includes(q)));
    if(!fms.length) return;
    totalShown+=fms.length;
    const collapsed = q ? '' : '';
    html+=`<div class="chapter-group ${collapsed}" data-ch="${ch.id}">
      <div class="chapter-head" onclick="toggleChapterGroup(this)">
        <div>
          <div class="ch-title" style="color:${chColor(ch.id)}">${chIcon(ch.id)}&nbsp; Bab ${ch.id} · ${esc(ch.title)}</div>
          <div class="ch-sub">${esc(ch.sub)}</div>
        </div>
        <span class="ch-count">${fms.length}</span>
        <span class="chev">▾</span>
      </div>
      <div class="chapter-body">
        ${fms.map(f=>`<div class="formula-row${f.id===activeId?' active':''}" data-id="${f.id}" onclick="selectFormula('${f.id}')">
          <span class="yr">${f.year}</span><span class="nm">${esc(f.name)}</span>
        </div>`).join('')}
      </div>
    </div>`;
  });
  $('sidebar').innerHTML = html || `<div style="padding:30px 16px;text-align:center;color:var(--faint);font-size:12.5px;">Tidak ada rumus yang cocok dengan pencarian.</div>`;
  $('statCount').textContent = q ? totalShown : FORMULAS.length;
}
function toggleChapterGroup(headEl){
  headEl.parentElement.classList.toggle('collapsed');
}
$('searchInput').addEventListener('input',e=>{
  searchQ=e.target.value;
  buildSidebar();
  if(searchQ.trim()){
    document.querySelectorAll('.chapter-group').forEach(g=>g.classList.remove('collapsed'));
  }
});

/* ---------- welcome / intro screen ---------- */
function renderWelcome(){
  $('main').innerHTML=`
    <div class="intro-card">
      <b>⚗️ Selamat datang di Quant Codex.</b> Perpustakaan interaktif berisi <b>${FORMULAS.length} rumus</b> quant finance dari tahun 1900–2024, terbagi dalam 5 bab.
      Pilih rumus dari daftar di samping (atau dari ticker berjalan di atas), lalu geser parameter untuk melihat hasil kalkulasi dan grafik bergerak secara real-time.
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;">
      ${CHAPTER_META.map(ch=>{
        const cnt=FORMULAS.filter(f=>f.ch===ch.id).length;
        const first=FORMULAS.find(f=>f.ch===ch.id);
        return `<div class="card" style="cursor:pointer;border-color:${chColor(ch.id)}33" onclick="selectFormula('${first.id}')">
          <div style="font-size:1.7em;margin-bottom:8px;">${chIcon(ch.id)}</div>
          <div style="font-size:12.5px;font-weight:700;color:var(--text);line-height:1.35;margin-bottom:4px;">${esc(ch.title)}</div>
          <div style="font-size:10.5px;color:var(--faint);line-height:1.4;margin-bottom:10px;">${esc(ch.sub)}</div>
          <div style="font-family:var(--mono);font-size:10.5px;color:${chColor(ch.id)};">${cnt} rumus →</div>
        </div>`;
      }).join('')}
    </div>`;
}

/* ---------- formula detail view ---------- */
function buildControlsHTML(f){
  return (f.vars||[]).map(v=>{
    if(v.type==='toggle'){
      return `<div class="ctrl" data-vk="${v.k}" data-vtype="toggle">
        <div class="ctrl-label"><span>${esc(v.label)}</span></div>
        <div class="toggle-wrap">
          <button type="button" class="${v.def?'on':''}" data-val="true" onclick="onToggleClick(this)">${esc(v.onLabel||'On')}</button>
          <button type="button" class="${!v.def?'on':''}" data-val="false" onclick="onToggleClick(this)">${esc(v.offLabel||'Off')}</button>
        </div>
      </div>`;
    }
    return `<div class="ctrl" data-vk="${v.k}" data-vtype="range">
      <div class="ctrl-label"><span>${esc(v.label)}</span><span class="val" id="val_${v.k}">${fmtNum(v.def, decimalsFor(v))}${v.unit||''}</span></div>
      <input type="range" id="rng_${v.k}" min="${v.min}" max="${v.max}" step="${v.step}" value="${v.def}" oninput="onSliderInput('${v.k}')">
    </div>`;
  }).join('');
}
function decimalsFor(v){
  const s=String(v.step);
  const dot=s.indexOf('.');
  return dot===-1?0:Math.min(4,s.length-dot-1);
}
function onToggleClick(btn){
  const wrap=btn.parentElement;
  [...wrap.children].forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  updateFormula();
}
function onSliderInput(key){
  const f=getActiveFormula(); if(!f) return;
  const vDef=(f.vars||[]).find(x=>x.k===key);
  const el=$('rng_'+key), out=$('val_'+key);
  if(out) out.textContent=fmtNum(+el.value, decimalsFor(vDef))+(vDef.unit||'');
  updateFormula();
}
function getActiveFormula(){ return FORMULAS.find(x=>x.id===activeId); }
function gatherParams(f){
  const p={};
  (f.vars||[]).forEach(v=>{
    if(v.type==='toggle'){
      const wrap=document.querySelector(`.ctrl[data-vk="${v.k}"] .toggle-wrap`);
      const onBtn=wrap?wrap.querySelector('button.on'):null;
      p[v.k]= onBtn ? onBtn.dataset.val==='true' : v.def;
    } else {
      const el=$('rng_'+v.k);
      p[v.k]= el ? +el.value : v.def;
    }
  });
  return p;
}

function selectFormula(id){
  const f=FORMULAS.find(x=>x.id===id);
  if(!f) return;
  activeId=id;
  currentSeed=(Date.now()&0xffffff);
  buildSidebar();
  const idx=FORMULAS.indexOf(f);
  const prev=FORMULAS[idx-1], next=FORMULAS[idx+1];
  const ck=chColorKey(f.ch);

  $('main').innerHTML=`
    <div class="f-meta">
      <span class="pill ch" style="color:${chColor(f.ch)};border-color:${chColor(f.ch)}44;background:${chColor(f.ch)}1a;">Bab ${f.ch} · ${esc(CHAPTER_META[f.ch-1].title)}</span>
      <span class="pill">${f.year}</span>
    </div>
    <h1 class="f-title">${esc(f.name)}</h1>
    <div class="f-who">${esc(f.who)}</div>
    <p class="f-desc">${esc(f.desc)}</p>
    <div class="f-formula-box"><span id="texHolder"></span></div>
    <div class="f-grid">
      <div class="card">
        <h4>🎛️ Parameter</h4>
        <div id="ctrlHolder">${buildControlsHTML(f)}</div>
      </div>
      <div class="card">
        <h4>📊 Hasil Kalkulasi</h4>
        <div id="readoutHolder"></div>
      </div>
    </div>
    <div class="f-chartwrap">
      <div class="chart-head">
        <h4>Grafik Interaktif</h4>
        ${f.stochastic?`<button class="randbtn" onclick="reseed()">🎲 Acak Ulang</button>`:''}
      </div>
      <canvas id="chartCanvas"></canvas>
      <div class="legend" id="legendHolder"></div>
    </div>
    <div style="display:flex;justify-content:space-between;gap:12px;margin:24px 0 40px;">
      ${prev?`<div class="card" style="cursor:pointer;flex:1;max-width:340px;" onclick="selectFormula('${prev.id}')"><div style="font-family:var(--mono);font-size:10px;color:var(--faint);text-transform:uppercase;">← Sebelumnya</div><div style="font-size:12.5px;color:var(--dim);margin-top:4px;">${esc(prev.name)}</div></div>`:'<div></div>'}
      ${next?`<div class="card" style="cursor:pointer;flex:1;max-width:340px;text-align:right;" onclick="selectFormula('${next.id}')"><div style="font-family:var(--mono);font-size:10px;color:var(--faint);text-transform:uppercase;">Berikutnya →</div><div style="font-size:12.5px;color:var(--dim);margin-top:4px;">${esc(next.name)}</div></div>`:'<div></div>'}
    </div>`;

  try{ katex.render(f.tex, $('texHolder'), {throwOnError:false, displayMode:true}); }catch(e){}

  if(chartInst){ chartInst.destroy(); chartInst=null; }
  chartInst = new QChart($('chartCanvas'));

  updateFormula();

  if(window.innerWidth<=880) closeSidebar();
  $('main').scrollTop=0;
}

function reseed(){ currentSeed=(Date.now()&0xffffff)^Math.floor(Math.random()*1e6); updateFormula(); }

function updateFormula(){
  const f=getActiveFormula(); if(!f) return;
  const params=gatherParams(f);
  let result;
  try{
    const rng=mulberry32(currentSeed);
    result=f.calc(params, rng);
  }catch(e){
    console.error('calc error', f.id, e);
    result={big:'ERR',bigUnit:'',bigLabel:'Kesalahan kalkulasi',subs:[],note:{type:'danger',text:'Terjadi kesalahan saat menghitung rumus ini.'},chart:null};
  }

  const ro=$('readoutHolder');
  const subsHtml=(result.subs||[]).map(s=>`<div class="sub-stat"><span class="l">${esc(s.l)}</span><span class="v">${esc(String(s.v))}</span></div>`).join('');
  const noteType=result.note?result.note.type:'';
  const noteHtml=result.note?`<div class="note-badge ${noteType}">${esc(result.note.text)}</div>`:'';
  ro.innerHTML=`<div class="readout-big">
      <div class="lbl">${esc(result.bigLabel||'Hasil')}</div>
      <div class="num">${esc(String(result.big))}<small>${esc(result.bigUnit||'')}</small></div>
    </div>
    <div class="sub-stats">${subsHtml}</div>
    ${noteHtml}`;

  const legend=$('legendHolder');
  if(result.chart && chartInst){
    chartInst.set(result.chart);
    if(result.chart.mode==='bars'){
      legend.innerHTML=(result.chart.bars||[]).map(b=>`<span class="legend-item"><span class="legend-sw" style="background:${b.color}"></span>${esc(b.label)}</span>`).join('');
    } else {
      legend.innerHTML=(result.chart.series||[]).map(s=>`<span class="legend-item"><span class="legend-sw${s.dash?' dash':''}" style="background:${s.dash?'none':s.color};border-color:${s.color}"></span>${esc(s.label)}</span>`).join('');
    }
  } else if(legend){
    legend.innerHTML='';
  }
}

/* ---------- mobile sidebar ---------- */
$('hamburger').addEventListener('click',()=>{
  $('sidebar').classList.toggle('open');
  $('body').classList.toggle('sb-open');
});
function closeSidebar(){ $('sidebar').classList.remove('open'); $('body').classList.remove('sb-open'); }
$('body').addEventListener('click',e=>{
  if($('body').classList.contains('sb-open') && e.target.id==='body'){ closeSidebar(); }
});

/* ---------- boot ---------- */
buildTicker();
buildSidebar();
renderWelcome();
</script>
