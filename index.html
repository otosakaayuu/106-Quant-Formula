addF([
{id:'ppp',ch:4,year:1918,who:'Gustav Cassel',name:'Purchasing Power Parity',
  desc:'Nilai tukar keseimbangan jangka panjang berdasarkan komparasi daya beli antar negara — menyiratkan mata uang dengan inflasi tinggi cenderung melemah.',
  tex:'\\frac{E_1}{E_0}=\\frac{P_{dom}}{P_{for}}=\\frac{(1+\\pi_d)}{(1+\\pi_f)}',
  vars:[{k:'E0',label:'Kurs Saat Ini',min:0.5,max:20000,step:1,def:15900,unit:''},{k:'piD',label:'Inflasi Domestik (π_d)',min:0,max:30,step:0.1,def:3,unit:'%'},{k:'piF',label:'Inflasi Asing (π_f)',min:0,max:30,step:0.1,def:2,unit:'%'},{k:'T',label:'Horizon (th)',min:1,max:10,step:1,def:5,unit:''}],
  calc(v){
    const ratio=Math.pow((1+v.piD/100)/(1+v.piF/100),v.T);
    const Eequil=v.E0*ratio;
    const pts=sweep(1,10,50,t=>v.E0*Math.pow((1+v.piD/100)/(1+v.piF/100),t));
    return {big:fmtNum(Eequil,0),bigUnit:'',bigLabel:'Kurs PPP Ekuilibrium di T='+v.T,
      subs:[{l:'Kurs Saat Ini',v:fmtNum(v.E0,0)},{l:'Selisih Inflasi',v:fmtNum(v.piD-v.piF,1)+'%/th'}],
      note:{type:Eequil>v.E0?'warn':'good',text:Eequil>v.E0?'Inflasi domestik lebih tinggi: mata uang domestik diprediksi melemah secara jangka panjang.':'Inflasi domestik lebih rendah: mata uang domestik diproyeksikan menguat.'},
      chart:{xMin:1,xMax:10,yMin:Math.min(...pts.map(p=>p.y))*0.95,yMax:Math.max(...pts.map(p=>p.y))*1.05,vline:v.T,series:[{label:'Kurs PPP vs Waktu',color:COLORS.cyan,pts}]}}
  }
},
{id:'uip',ch:4,year:1930,who:'Irving Fisher',name:'Uncovered Interest Rate Parity',
  desc:'Proyeksi perubahan kurs berdasarkan selisih murni suku bunga nominal dua negara — dalam praktiknya sering gagal (forward premium puzzle).',
  tex:'\\frac{E(S_{t+1})-S_t}{S_t}=i_d-i_f',
  vars:[{k:'S',label:'Kurs Spot Saat Ini',min:0.5,max:20000,step:1,def:15900,unit:''},{k:'id',label:'Suku Bunga Domestik (i_d)',min:0,max:20,step:0.25,def:6,unit:'%'},{k:'if_',label:'Suku Bunga Asing (i_f)',min:0,max:20,step:0.25,def:5.5,unit:'%'},{k:'T',label:'Horizon (th)',min:1,max:5,step:0.5,def:1,unit:''}],
  calc(v){
    const expectedChange=(v.id-v.if_)/100;
    const Efwd=v.S*Math.pow(1+expectedChange,v.T);
    const pts=sweep(1,5,40,t=>v.S*Math.pow(1+expectedChange,t));
    return {big:fmtNum(Efwd,0),bigUnit:'',bigLabel:'E(Spot) UIP di T='+v.T+'th',
      subs:[{l:'Selisih Suku Bunga',v:fmtNum(v.id-v.if_,2)+'%'},{l:'% Perubahan Ekspektasi',v:fmtNum((Efwd/v.S-1)*100,2)+'%'}],
      note:{type:'info',text:'UIP sering gagal dalam jangka pendek — negara dengan suku bunga tinggi justru sering menguat (forward premium puzzle / carry trade anomaly).'},
      chart:{xMin:1,xMax:5,yMin:Math.min(...pts.map(p=>p.y))*0.95,yMax:Math.max(...pts.map(p=>p.y))*1.05,series:[{label:'E(Spot) UIP',color:COLORS.amber,pts}]}}
  }
},
{id:'dornbusch',ch:4,year:1976,who:'Rudi Dornbusch',name:'Dornbusch Overshooting Model',
  desc:'Menjelaskan mengapa kurs bereaksi berlebihan (overshooting) saat kebijakan moneter berubah — karena pasar keuangan lebih cepat bergerak dari pasar barang.',
  tex:'\\Delta e = -(1/\\lambda)(i-i^*-\\bar{\\pi})',
  vars:[{k:'iDom',label:'Suku Bunga Domestik',min:0,max:20,step:0.25,def:8,unit:'%'},{k:'iFor',label:'Suku Bunga Asing',min:0,max:20,step:0.25,def:5,unit:'%'},{k:'targetDep',label:'Depresiasi Jangka Panjang',min:-10,max:10,step:0.25,def:2,unit:'%'},{k:'lambda',label:'Kecepatan Penyesuaian (λ)',min:0.1,max:2,step:0.1,def:0.5,unit:''}],
  calc(v){
    const excessI=(v.iDom-v.iFor)/100-v.targetDep/100;
    const overshoot=-(1/v.lambda)*excessI*100;
    const periods=20; const pts=[];
    for(let t=0;t<=periods;t++){
      const adj=overshoot*Math.exp(-v.lambda*t/4);
      pts.push({x:t,y:adj});
    }
    return {big:fmtNum(overshoot,2),bigUnit:'%',bigLabel:'Overshooting Jangka Pendek',
      subs:[{l:'Kelebihan Suku Bunga',v:fmtNum((v.iDom-v.iFor),2)+'%'}],
      note:{type:'info',text:'Kurs "melampaui" level keseimbangannya pada awalnya, lalu meluruh perlahan kembali — menjelaskan volatilitas FX tinggi saat bank sentral mengubah kebijakan.'},
      chart:{xMin:0,xMax:periods,yMin:Math.min(...pts.map(p=>p.y))*1.2,yMax:Math.max(...pts.map(p=>p.y))*1.2+0.5,hlines:[{y:0,color:COLORS.faint,dash:true}],series:[{label:'Depresiasi Kurs Meluruh',color:COLORS.amber,pts}]}}
  }
},
{id:'carry-trade',ch:4,year:1984,who:'Eugene Fama',name:'Carry Trade & Forward Premium',
  desc:'Mengeksploitasi anomali bahwa suku bunga tinggi justru memperkuat kurs — bukan melemahkan seperti yang diprediksi UIP (forward premium puzzle Fama).',
  tex:'E(R_{carry})=(i_H-i_L)-E(\\Delta e)',
  vars:[{k:'iHigh',label:'Suku Bunga Tinggi',min:0,max:20,step:0.25,def:8,unit:'%'},{k:'iLow',label:'Suku Bunga Rendah',min:0,max:10,step:0.25,def:1,unit:'%'},{k:'actualDep',label:'Depresiasi Kurs Aktual',min:-10,max:10,step:0.5,def:1,unit:'%'}],
  calc(v){
    const gross=v.iHigh-v.iLow;
    const net=gross-v.actualDep;
    const pts=sweep(-10,10,60,dep=>gross-dep);
    return {big:fmtNum(net,2),bigUnit:'%',bigLabel:'Return Carry Trade Bersih',
      subs:[{l:'Carry Kotor',v:fmtNum(gross,2)+'%'},{l:'Depresiasi Aktual',v:fmtNum(v.actualDep,2)+'%'}],
      note:{type: net>3?'good':net>0?'info':'warn',text: net>3?'Carry menarik: selisih suku bunga jauh melebihi depresiasi aktual.':net>0?'Return positif namun tipis — waspadai crash mendadak (unwind risk)':'Depresiasi melebihi carry — posisi carry trade merugi.'},
      chart:{xMin:-10,xMax:10,yMin:Math.min(...pts.map(p=>p.y))-1,yMax:Math.max(...pts.map(p=>p.y))+1,vline:v.actualDep,hlines:[{y:0,color:COLORS.faint,dash:true}],series:[{label:'Return Carry vs Depresiasi Aktual',color:COLORS.amber,pts}]}}
  }
},
{id:'fx-mean-rev',ch:4,year:1987,who:'Econometricians',name:'FX Mean Reversion',
  desc:'Hitungan half-life: seberapa cepat nilai tukar menyimpang kembali ke level keseimbangannya setelah guncangan.',
  tex:'\\Delta e_t=\\alpha+\\beta e_{t-1}+\\varepsilon_t,\\quad HL=-\\frac{\\ln 2}{\\ln(1+\\beta)}',
  vars:[{k:'meanRevSpeed',label:'Kecepatan Mean Reversion (β)',min:-0.5,max:-0.01,step:0.01,def:-0.07,unit:''},{k:'currentDev',label:'Deviasi Saat Ini dari Ekuilibrium',min:-20,max:20,step:0.5,def:8,unit:'%'}],
  calc(v){
    const HL=-Math.log(2)/Math.log(1+v.meanRevSpeed);
    const pts=sweep(0,HL*4,60,t=>v.currentDev*Math.pow(1+v.meanRevSpeed,t));
    return {big:fmtNum(HL,1),bigUnit:' bln',bigLabel:'Half-Life Konvergensi',
      subs:[{l:'Deviasi Saat Ini',v:fmtNum(v.currentDev,2)+'%'},{l:'Deviasi Setelah 1 HL',v:fmtNum(v.currentDev/2,2)+'%'}],
      note:{type:'info',text:'Half-life PPP empiris untuk FX utama biasanya 3–5 tahun — kurs bergerak perlahan menuju keseimbangan jangka panjangnya.'},
      chart:{xMin:0,xMax:HL*4,yMin:0,yMax:Math.abs(v.currentDev)*1.15,vline:HL,hlines:[{y:0,color:COLORS.faint,dash:true}],series:[{label:'Deviasi Meluruh (%)',color:COLORS.cyan,pts}]}}
  }
},
{id:'beer',ch:4,year:1994,who:'Clark, MacDonald',name:'BEER FX Model',
  desc:'Behavioral Equilibrium Exchange Rate — memprediksi kurs ekuilibrium langsung dari variabel fundamental makroekonomi (terms of trade, NFA, produktivitas).',
  tex:'q^* = \\beta_1 TOT + \\beta_2 NFA + \\beta_3 PROD',
  vars:[{k:'tot',label:'Terms of Trade (Δ%)',min:-20,max:20,step:0.5,def:5,unit:''},{k:'nfa',label:'Net Foreign Assets (% GDP)',min:-100,max:50,step:1,def:-20,unit:''},{k:'prod',label:'Diferensial Produktivitas',min:-5,max:10,step:0.5,def:2,unit:'%'}],
  calc(v){
    const qStar=0.15*v.tot+0.03*v.nfa+0.5*v.prod;
    const bars=[{label:'Terms of Trade',value:0.15*v.tot,color:COLORS.amber},{label:'Net Foreign Assets',value:0.03*v.nfa,color:COLORS.cyan},{label:'Produktivitas',value:0.5*v.prod,color:COLORS.green},{label:'REER Equilibrium q*',value:qStar,color:COLORS.violet}];
    return {big:fmtNum(qStar,2),bigUnit:'%',bigLabel:'BEER Ekuilibrium (q*)',
      subs:[{l:'Kontribusi ToT',v:fmtNum(0.15*v.tot,2)+'%'},{l:'Kontribusi NFA',v:fmtNum(0.03*v.nfa,2)+'%'}],
      note:{type:'info',text:'q*>0 berarti nilai tukar riil diperkirakan menguat (apresiasi); q*<0 berarti tertekan menuju depresiasi secara fundamental.'},
      chart:{mode:'bars',decimals:2,unit:'%',bars}}
  }
},
{id:'dollar-smile',ch:4,year:2001,who:'Stephen Jen',name:'Dollar Smile Theory',
  desc:'Fenomena USD menguat di kedua ekstrem: saat krisis global (safe-haven) DAN saat ekonomi AS unggul — melemah hanya saat pertumbuhan global merata.',
  tex:'\\text{DXY}(g)=a\\cdot g^2-b\\cdot g+c',
  vars:[{k:'globalGrowth',label:'Pertumbuhan Global (G10 PMI)',min:40,max:60,step:0.5,def:50,unit:''},{k:'usOutperform',label:'Outperformance AS vs Global',min:-5,max:5,step:0.25,def:1,unit:'%'}],
  calc(v){
    const g=v.globalGrowth-50; const u=v.usOutperform;
    const dxy=0.3*g*g-1.5*g+2*u;
    const pts=sweep(40,60,50,gv=>0.3*(gv-50)**2-1.5*(gv-50)+2*u);
    return {big:fmtNum(dxy,2),bigUnit:' idx',bigLabel:'Tekanan DXY (relatif)',
      subs:[{l:'Fase Smile Saat Ini',v:v.globalGrowth<47?'Risk-Off (USD kuat)':v.globalGrowth>53?'US Outperform (USD kuat)':'Middle (USD lemah)'}],
      note:{type:'info',text:'DXY membentuk kurva "U" (senyum) terhadap pertumbuhan global — titik terkuat DXY di ekstrem bawah (krisis) dan atas (AS dominan).'},
      chart:{xMin:40,xMax:60,yMin:Math.min(...pts.map(p=>p.y))-1,yMax:Math.max(...pts.map(p=>p.y))+1,vline:v.globalGrowth,hlines:[{y:0,color:COLORS.faint,dash:true}],series:[{label:'Tekanan DXY vs Pertumbuhan Global PMI',color:COLORS.amber,pts}]}}
  }
},
{id:'commodity-currency',ch:4,year:2002,who:'Chen, Rogoff',name:'Commodity Currency Model',
  desc:'Valuasi mata uang negara eksportir komoditas primer (AUD, CAD, NOK, CLP) berdasarkan fluktuasi harga komoditas unggulan mereka.',
  tex:'\\Delta e_t = \\alpha + \\beta\\,\\Delta P_{commodity,t} + \\varepsilon_t',
  vars:[{k:'beta',label:'Elastisitas FX-Komoditas (β)',min:0,max:1,step:0.01,def:0.35,unit:''},{k:'commChange',label:'Perubahan Harga Komoditas',min:-30,max:30,step:1,def:10,unit:'%'}],
  calc(v){
    const fxChg=v.beta*v.commChange;
    const pts=sweep(-30,30,60,dp=>v.beta*dp);
    return {big:fmtNum(fxChg,2),bigUnit:'%',bigLabel:'Prediksi Perubahan FX',
      subs:[{l:'Elastisitas β',v:fmtNum(v.beta,2)},{l:'Jika komoditas ±1%',v:'FX ≈ ±'+fmtNum(v.beta,2)+'%'}],
      note:{type:'info',text:'Negara eksportir komoditas: β AUD/gold≈0.3, CAD/oil≈0.25, NOK/oil≈0.35 — korelasinya historis sangat kuat namun dapat berubah di krisis.'},
      chart:{xMin:-30,xMax:30,yMin:Math.min(...pts.map(p=>p.y))*1.1,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.commChange,hlines:[{y:0,color:COLORS.faint,dash:true}],series:[{label:'Perubahan FX vs Komoditas',color:COLORS.cyan,pts}]}}
  }
},
{id:'taylor-rule-fx',ch:4,year:2005,who:'Engel, West',name:'Taylor Rule FX Model',
  desc:'Proyeksi nilai tukar berdasarkan sinyal dari aturan Taylor: selisih inflasi dan output gap antar dua negara mendorong pergerakan kurs.',
  tex:'i_t=r^*+\\pi^*+1.5(\\pi_t-\\pi^*)+0.5(y_t-\\bar y)',
  vars:[{k:'piD',label:'Inflasi Domestik',min:0,max:15,step:0.25,def:4,unit:'%'},{k:'piF',label:'Inflasi Asing',min:0,max:15,step:0.25,def:2,unit:'%'},{k:'gapD',label:'Output Gap Domestik',min:-5,max:5,step:0.25,def:-1,unit:'%'},{k:'gapF',label:'Output Gap Asing',min:-5,max:5,step:0.25,def:0,unit:'%'}],
  calc(v){
    const piStar=2,rStar=2;
    const iD=rStar+piStar+1.5*(v.piD-piStar)+0.5*v.gapD;
    const iF=rStar+piStar+1.5*(v.piF-piStar)+0.5*v.gapF;
    const differential=iD-iF;
    return {big:fmtNum(differential,2),bigUnit:'%',bigLabel:'Selisih Suku Bunga Taylor',
      subs:[{l:'Suku Bunga Domestik Taylor',v:fmtNum(iD,2)+'%'},{l:'Suku Bunga Asing Taylor',v:fmtNum(iF,2)+'%'}],
      note:{type: differential>0?'good':'warn',text: differential>0? 'Differensial positif: model Taylor memprediksi apresiasi mata uang domestik jangka menengah.':'Differensial negatif: tekanan depresiasi mata uang domestik menurut model Taylor.'},
      chart:{mode:'bars',decimals:2,unit:'%',bars:[{label:'Suku Bunga Dom. (Taylor)',value:iD,color:COLORS.amber},{label:'Suku Bunga Asing (Taylor)',value:iF,color:COLORS.cyan},{label:'Differensial',value:differential,color:COLORS.green}]}}
  }
},
{id:'cnh-cny',ch:4,year:2010,who:'PBOC / Market',name:'CNH/CNY Premium',
  desc:'Spread arbitrase antara CNY onshore (pasar domestik terregulasi) dan CNH offshore (Hongkong bebas) — mencerminkan tekanan aliran modal keluar-masuk Tiongkok.',
  tex:'\\text{Premium}=\\frac{CNH-CNY}{CNY}\\times 10{,}000\\text{ bps}',
  vars:[{k:'cny',label:'Kurs CNY (Onshore)',min:6,max:8,step:0.001,def:7.24,unit:''},{k:'cnh',label:'Kurs CNH (Offshore)',min:6,max:8,step:0.001,def:7.27,unit:''}],
  calc(v){
    const premium=(v.cnh-v.cny)/v.cny*10000;
    const pts=sweep(-300,300,60,p=>v.cny*(1+p/10000));
    return {big:fmtNum(premium,0),bigUnit:' bps',bigLabel:'CNH−CNY Spread',
      subs:[{l:'% Selisih',v:fmtNum((v.cnh-v.cny)/v.cny*100,3)+'%'}],
      note:{type: Math.abs(premium)>100?'warn':'info',text: premium>100?'CNH lebih lemah dari CNY: tekanan capital outflow tinggi, pasar mengantisipasi depresiasi CNY lebih lanjut.':premium<-100?'CNH lebih kuat: sinyal capital inflow — ekspektasi apresiasi CNY di pasar bebas.':'Spread normal: kondisi aliran modal relatif seimbang.'},
      chart:{mode:'bars',decimals:0,unit:' bps',bars:[{label:'CNH−CNY (bps)',value:premium,color: premium>50?COLORS.red:premium<-50?COLORS.green:COLORS.amber}]}}
  }
},
{id:'cdd',ch:4,year:2011,who:'ByteCoin Devs',name:'Coin Days Destroyed (CDD)',
  desc:'Detektor makro on-chain yang menyala ketika entitas whale kuno mulai memindahkan supply yang lama tidak bergerak — sinyal distribusi tersembunyi.',
  tex:'CDD=\\sum_i\\text{value}_i\\times\\text{coin\\_age}_i',
  vars:[{k:'vol',label:'Volume Transaksi Harian',min:100,max:100000,step:100,def:5000,unit:' BTC'},{k:'avgAge',label:'Rata-rata Usia Koin Bergerak',min:1,max:1000,step:10,def:120,unit:' hari'},{k:'ma30',label:'CDD MA-30 Baseline',min:10000,max:2000000,step:1000,def:300000,unit:''}],
  calc(v){
    const cdd=v.vol*v.avgAge;
    const ratio=cdd/v.ma30;
    const pts=sweep(1,1000,60,age=>v.vol*age/v.ma30);
    return {big:fmtCompact(cdd),bigUnit:'',bigLabel:'CDD Harian',
      subs:[{l:'Rasio vs MA30',v:fmtNum(ratio,2)+'×'}],
      note:{type: ratio>2?'warn':ratio>1.2?'info':'good',text: ratio>2?'CDD jauh di atas rata-rata: whale lama aktif memindahkan koin — waspada potensi tekanan jual tersembunyi.':'CDD normal: tidak ada sinyal aktivitas whale kuno abnormal.'},
      chart:{xMin:1,xMax:1000,yMin:0,yMax:3,vline:v.avgAge,hlines:[{y:1,color:COLORS.faint,dash:true},{y:2,color:COLORS.red,dash:true}],series:[{label:'Rasio CDD/MA30 vs Usia Koin',color:COLORS.amber,pts}]}}
  }
},
{id:'metcalfe',ch:4,year:2012,who:'Robert Metcalfe',name:"Metcalfe's Law",
  desc:'Nilai jaringan sebanding dengan kuadrat jumlah pengguna aktifnya — fondasi valuasi fundamental aset berbasis jaringan seperti Bitcoin.',
  tex:'V=k\\cdot n^2',
  vars:[{k:'users',label:'Pengguna Aktif (n)',min:100,max:100000,step:100,def:10000,unit:''},{k:'k',label:'Konstanta Nilai (k)',min:0.001,max:1,step:0.001,def:0.01,unit:''},{k:'currentMCap',label:'Kapitalisasi Pasar Saat Ini',min:1,max:100000,step:100,def:1000,unit:' jt'}],
  calc(v){
    const fairValue=v.k*v.users*v.users/1e6;
    const premium=(v.currentMCap/fairValue-1)*100;
    const pts=sweep(100,100000,60,n=>v.k*n*n/1e6);
    return {big:fmtCompact(fairValue),bigUnit:' jt',bigLabel:'Nilai Wajar Metcalfe',
      subs:[{l:'Kapitalisasi Pasar',v:fmtCompact(v.currentMCap)+' jt'},{l:'Premium/Diskon',v:fmtNum(premium,1)+'%'}],
      note:{type: Math.abs(premium)>50?'warn':'info',text: premium>50?'Aset diperdagangkan dengan premium signifikan terhadap valuasi Metcalfe.':premium<-50?'Aset diperdagangkan dengan diskon besar vs valuasi jaringan.':'Valuasi pasar mendekati perkiraan Metcalfe.'},
      chart:{xMin:100,xMax:100000,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.users,series:[{label:'Nilai Metcalfe = k·n² (jt)',color:COLORS.cyan,pts}]}}
  }
},
{id:'nvt',ch:4,year:2017,who:'Willy Woo',name:'NVT Ratio',
  desc:'Network Value to Transactions — rasio kapitalisasi pasar terhadap throughput on-chain, analogi Price-to-Earnings crypto. NVT tinggi = mahal; rendah = murah.',
  tex:'NVT=\\frac{\\text{Market Cap}}{\\text{Daily On-chain Volume}}',
  vars:[{k:'mcap',label:'Kapitalisasi Pasar',min:1,max:2000,step:1,def:1200,unit:' M$'},{k:'dailyVol',label:'Volume On-Chain Harian',min:0.1,max:100,step:0.1,def:8,unit:' M$'}],
  calc(v){
    const nvt=v.mcap/v.dailyVol;
    const annualVol=v.dailyVol*365;
    const pts=sweep(0.1,100,60,dv=>v.mcap/dv);
    return {big:fmtNum(nvt,1),bigUnit:'',bigLabel:'NVT Ratio',
      subs:[{l:'Volume Tahunan Annualized',v:fmtCompact(annualVol)+' M$'},{l:'P/E Analog',v:fmtNum(nvt/365,2)+'× harian'}],
      note:{type: nvt>250?'warn':nvt<80?'good':'info',text: nvt>250?'NVT sangat tinggi: pasar dinilai jauh di atas throughput nyata jaringan — zona jenuh beli historis.':nvt<80?'NVT rendah: aktivitas on-chain relatif tinggi vs valuasi — berpotensi undervalued.':'NVT dalam kisaran normal historis.'},
      chart:{xMin:0.1,xMax:100,yMin:0,yMax:Math.min(Math.max(...pts.map(p=>p.y)),2000),vline:v.dailyVol,hlines:[{y:250,color:COLORS.red,dash:true},{y:80,color:COLORS.green,dash:true}],series:[{label:'NVT vs Volume Harian',color:COLORS.amber,pts}]}}
  }
},
{id:'realized-cap',ch:4,year:2018,who:'Coinmetrics',name:'Realized Capitalization',
  desc:'Menilai kapitalisasi berdasarkan harga saat setiap koin terakhir berpindah — lebih mencerminkan "biaya dasar" pemegang agregat dibanding harga pasar.',
  tex:'RC=\\sum_i\\text{supply}_i\\times P_{\\text{last\\_moved}}(i)',
  vars:[{k:'floatPct',label:'Supply "Aktif" (<1th)',min:0,max:100,step:1,def:40,unit:'%'},{k:'currentPrice',label:'Harga Saat Ini',min:1000,max:100000,step:100,def:60000,unit:''},{k:'avgEntryOld',label:'Harga Rata-rata Holder Lama',min:1000,max:50000,step:100,def:20000,unit:''},{k:'totalSupply',label:'Total Supply Beredar',min:1,max:21,step:0.1,def:19.7,unit:' jt'}],
  calc(v){
    const floatSupply=v.totalSupply*v.floatPct/100;
    const dormantSupply=v.totalSupply*(1-v.floatPct/100);
    const rc=(floatSupply*v.currentPrice+dormantSupply*v.avgEntryOld)*1e6/1e9;
    const mcap=v.totalSupply*v.currentPrice*1e6/1e9;
    const mvrv=mcap/rc;
    return {big:fmtNum(rc,1),bigUnit:' B$',bigLabel:'Realized Cap',
      subs:[{l:'Market Cap',v:fmtNum(mcap,1)+' B$'},{l:'MVRV Ratio',v:fmtNum(mvrv,2)+'×'}],
      note:{type: mvrv>3?'warn':mvrv<1?'good':'info',text: mvrv>3?'MVRV>3: harga jauh di atas basis biaya agregat — zona distribusi historis (top pasar).':mvrv<1?'MVRV<1: harga di bawah basis biaya pemegang — zona akumulasi (bottom historis).':'MVRV normal.'},
      chart:{mode:'bars',decimals:1,unit:' B$',bars:[{label:'Realized Cap',value:rc,color:COLORS.cyan},{label:'Market Cap',value:mcap,color:COLORS.amber}]}}
  }
},
{id:'mvrv-z',ch:4,year:2019,who:'Murad, Puell',name:'MVRV Z-Score',
  desc:'Standarisasi deviasi Market Cap vs Realized Cap — mengukur seberapa jauh harga dari basis biaya rata-rata pemegang, sinyal top/bottom makro.',
  tex:'Z=\\frac{MC-RC}{\\sigma(MC)}',
  vars:[{k:'mc',label:'Market Cap (B$)',min:1,max:2000,step:1,def:1200,unit:' B$'},{k:'rc',label:'Realized Cap (B$)',min:1,max:1000,step:1,def:500,unit:' B$'},{k:'sigma',label:'Standar Deviasi MC Historis',min:10,max:500,step:5,def:200,unit:' B$'}],
  calc(v){
    const z=(v.mc-v.rc)/v.sigma;
    const pts=sweep(1,2000,60,mc=>(mc-v.rc)/v.sigma);
    return {big:fmtNum(z,2),bigUnit:'σ',bigLabel:'MVRV Z-Score',
      subs:[{l:'MVRV Ratio',v:fmtNum(v.mc/v.rc,2)+'×'}],
      note:{type: z>7?'warn':z<1?'good':'info',text: z>7?'Z>7: Zona merah historis — BTC berada di wilayah euforia, distribusi besar umumnya terjadi di zona ini.':z<1?'Z<1: Zona hijau — BTC berada di bawah realized cap, zona akumulasi bottom historis.':'Z dalam kisaran netral.'},
      chart:{xMin:1,xMax:2000,yMin:-3,yMax:12,vline:v.mc,hlines:[{y:7,color:COLORS.red,dash:true},{y:1,color:COLORS.green,dash:true}],series:[{label:'MVRV Z-Score vs Market Cap',color:COLORS.amber,pts}]}}
  }
},
{id:'s2f',ch:4,year:2019,who:'PlanB',name:'Stock-to-Flow (S2F) Model',
  desc:'Memodelkan lonjakan kapitalisasi Bitcoin akibat guncangan pasokan (halving) — rasio stok vs aliran produksi baru menentukan kelangkaan dan valuasi.',
  tex:'P=a\\cdot\\Big(\\frac{\\text{Stock}}{\\text{Flow}}\\Big)^b',
  vars:[{k:'stock',label:'Total Supply (Stock)',min:1,max:21,step:0.1,def:19.7,unit:' jt BTC'},{k:'flow',label:'Produksi Baru per Tahun (Flow)',min:0.05,max:1,step:0.01,def:0.16,unit:' jt BTC'},{k:'a',label:'Konstanta a',min:0.1,max:10,step:0.1,def:0.4,unit:''},{k:'b',label:'Eksponen b',min:0.5,max:5,step:0.1,def:3,unit:''}],
  calc(v){
    const sf=v.stock/v.flow;
    const price=v.a*Math.pow(sf,v.b);
    const pts=sweep(1,200,60,sf2=>v.a*Math.pow(sf2,v.b));
    return {big:fmtCompact(price),bigUnit:'$',bigLabel:'S2F Target Harga',
      subs:[{l:'Stock-to-Flow Ratio',v:fmtNum(sf,1)+'×'}],
      note:{type:'info',text:'Model S2F bersifat sangat kontroversial secara akademis — historis cocok namun belum terbukti prediktif ke depan secara konsisten.'},
      chart:{xMin:1,xMax:200,yMin:0,yMax:Math.min(Math.max(...pts.map(p=>p.y)),500000),vline:sf,series:[{label:'S2F Price Model vs SF Ratio',color:COLORS.amber,pts}]}}
  }
},
{id:'sopr',ch:4,year:2019,who:'Renato Shirakashi',name:'SOPR',
  desc:'Spent Output Profit Ratio — perbandingan nilai saat dijual vs nilai saat dibeli secara agregat. SOPR<1 berarti pasar sedang menjual dalam kerugian.',
  tex:'SOPR=\\frac{\\sum realized\\ value}{\\sum created\\ value}',
  vars:[{k:'realizedVal',label:'Total Realized Value (M$)',min:100,max:100000,step:100,def:8000,unit:' M$'},{k:'createdVal',label:'Total Created Value (M$)',min:100,max:100000,step:100,def:7500,unit:' M$'}],
  calc(v){
    const sopr=v.realizedVal/v.createdVal;
    return {big:fmtNum(sopr,3),bigUnit:'',bigLabel:'SOPR Harian',
      subs:[{l:'P/L Agregat',v: sopr>1?'Profit (SOPR>1)':'Rugi (SOPR<1)'}],
      note:{type: sopr>1.1?'info':sopr<0.98?'good':'info',text: sopr>1.05?'SOPR>1: mayoritas supply yang dipindahkan hari ini dijual dalam keuntungan.':sopr<0.98?'SOPR<1: pasar menjual dalam kerugian — sinyal panik sell / capitulation potensial.':'SOPR mendekati 1: pasar break-even.'},
      chart:{mode:'bars',decimals:1,unit:' M$',bars:[{label:'Realized Value',value:v.realizedVal,color:COLORS.green},{label:'Created Value',value:v.createdVal,color:COLORS.amber},{label:'SOPR×5000',value:sopr*5000,color:COLORS.cyan}]}}
  }
},
{id:'hash-ribbons',ch:4,year:2019,who:'Charles Edwards',name:'Hash Ribbons',
  desc:'Indikasi pemulihan harga saat pita hash rate jangka pendek (MA30) memotong ke atas pita jangka panjang (MA60) setelah periode kapitulasi penambang.',
  tex:'\\text{Signal}=\\text{sign}(MA_{30}^{HR}-MA_{60}^{HR})',
  vars:[{k:'hr30',label:'Hash Rate MA-30 (EH/s)',min:100,max:1000,step:5,def:550,unit:' EH/s'},{k:'hr60',label:'Hash Rate MA-60 (EH/s)',min:100,max:1000,step:5,def:520,unit:' EH/s'}],
  calc(v){
    const signal=v.hr30>v.hr60?1:-1;
    const ratio=v.hr30/v.hr60;
    return {big: v.hr30>v.hr60?'BUY ▲':'WAIT ▼',bigUnit:'',bigLabel:'Sinyal Hash Ribbons',
      subs:[{l:'HR MA30 / MA60',v:fmtNum(ratio,3)+'×'},{l:'Status',v: v.hr30>v.hr60?'Recovery':'Capitulation'}],
      note:{type: signal>0?'good':'warn',text: signal>0?'MA30 > MA60: penambang telah pulih dari tekanan profitabilitas — secara historis sinyal beli jangka menengah yang kuat.':'MA30 < MA60: penambang masih dalam tekanan — belum ada sinyal pemulihan valid.'},
      chart:{mode:'bars',decimals:0,unit:' EH/s',bars:[{label:'Hash Rate MA30',value:v.hr30,color: v.hr30>v.hr60?COLORS.green:COLORS.red},{label:'Hash Rate MA60',value:v.hr60,color:COLORS.faint}]}}
  }
},
{id:'puell-multiple',ch:4,year:2019,who:'David Puell',name:'Puell Multiple',
  desc:'Membandingkan pendapatan harian penambang BTC (USD) vs rata-rata setahun — siklus tinggi mencerminkan over-insentif penambang, menyiratkan potensi top pasar.',
  tex:'PM=\\frac{\\text{Daily Miner Revenue}}{MA_{365}(\\text{Revenue})}',
  vars:[{k:'dailyRev',label:'Pendapatan Penambang Hari Ini (M$)',min:1,max:100,step:0.5,def:25,unit:' M$'},{k:'ma365Rev',label:'MA365 Pendapatan (M$)',min:1,max:50,step:0.5,def:15,unit:' M$'}],
  calc(v){
    const pm=v.dailyRev/v.ma365Rev;
    const pts=sweep(1,100,60,dr=>dr/v.ma365Rev);
    return {big:fmtNum(pm,2),bigUnit:'×',bigLabel:'Puell Multiple',
      subs:[{l:'Revenue Harian',v:fmtNum(v.dailyRev,1)+' M$'},{l:'Baseline MA365',v:fmtNum(v.ma365Rev,1)+' M$'}],
      note:{type: pm>4?'warn':pm<0.5?'good':'info',text: pm>4?'Puell Multiple tinggi: penambang sangat profitable — zona distribusi historis top pasar.':pm<0.5?'Puell Multiple rendah: penambang tertekan — zona akumulasi historis bottom pasar.':'Zona netral.'},
      chart:{xMin:1,xMax:100,yMin:0,yMax:8,vline:v.dailyRev,hlines:[{y:4,color:COLORS.red,dash:true},{y:0.5,color:COLORS.green,dash:true}],series:[{label:'Puell Multiple vs Revenue Harian',color:COLORS.amber,pts}]}}
  }
},
{id:'pi-cycle',ch:4,year:2019,who:'Philip Swift',name:'Pi Cycle Top',
  desc:'Persilangan MA111 melewati MA350×2 secara historis menandai zona take-profit sangat dekat dengan puncak siklus BTC, dengan akurasi ≤3 hari dari top.',
  tex:'\\text{Signal}=MA_{111}>MA_{350}\\times 2',
  vars:[{k:'ma111',label:'Moving Average 111 hari',min:10000,max:150000,step:500,def:62000,unit:''},{k:'ma350',label:'Moving Average 350 hari',min:5000,max:80000,step:500,def:35000,unit:''}],
  calc(v){
    const doubleMA=v.ma350*2;
    const gap=((v.ma111-doubleMA)/doubleMA*100);
    return {big:fmtNum(doubleMA,0),bigUnit:'$',bigLabel:'MA350 × 2 (Garis Sinyal)',
      subs:[{l:'MA111 Saat Ini',v:fmtNum(v.ma111,0)},{l:'Jarak MA111 dari Sinyal',v:fmtNum(gap,2)+'%'}],
      note:{type: gap>-3&&gap<3?'warn':gap<-10?'good':'info',text: gap>-3&&gap<3?'⚠️ SANGAT DEKAT dengan sinyal Pi Cycle Top — secara historis potensi top siklus sudah sangat dekat!':gap<-10?'MA111 jauh di bawah MA350×2 — belum ada sinyal top dari indikator Pi Cycle.':'MA111 mendekati MA350×2 — mulai waspadai sinyal.'},
      chart:{mode:'bars',decimals:0,bars:[{label:'MA111',value:v.ma111,color:COLORS.amber},{label:'MA350 × 2',value:doubleMA,color:COLORS.red}]}}
  }
},
{id:'exchange-net',ch:4,year:2019,who:'Glassnode',name:'Exchange Net Position',
  desc:'Analisis delta inflow/outflow bersih pada pertukaran terpusat — outflow bersih berarti koin bergerak ke self-custody (bullish), inflow bersih berarti tekanan jual meningkat.',
  tex:'NetFlow=Inflow-Outflow',
  vars:[{k:'inflow',label:'Inflow Harian ke Exchange',min:100,max:50000,step:100,def:3000,unit:' BTC'},{k:'outflow',label:'Outflow Harian dari Exchange',min:100,max:50000,step:100,def:4500,unit:' BTC'}],
  calc(v){
    const net=v.outflow-v.inflow;
    return {big:fmtNum(net,0),bigUnit:' BTC',bigLabel: net>0?'Net Outflow (Bullish)':'Net Inflow (Bearish)',
      subs:[{l:'Inflow',v:fmtNum(v.inflow,0)+' BTC'},{l:'Outflow',v:fmtNum(v.outflow,0)+' BTC'}],
      note:{type: net>500?'good':net<-500?'warn':'info',text: net>500?'Outflow bersih signifikan: koin bergerak keluar exchange menuju self-custody — sinyal akumulasi jangka panjang.':net<-500?'Inflow bersih tinggi: koin masuk exchange — potensi tekanan jual meningkat.':'Aliran seimbang — tidak ada sinyal kuat.'},
      chart:{mode:'bars',decimals:0,unit:' BTC',bars:[{label:'Inflow',value:v.inflow,color:COLORS.red},{label:'Outflow',value:v.outflow,color:COLORS.green},{label:'Net',value:net,color: net>0?COLORS.green:COLORS.red}]}}
  }
},
{id:'log-rainbow',ch:4,year:2019,who:'Azop',name:'Log Regression Rainbow',
  desc:'Kurva regresi logaritmik Bitcoin harga vs hari sejak genesis — mengidentifikasi zona over/undervalued berdasarkan deviasi dari tren jangka panjang.',
  tex:'\\ln(P)=a+b\\cdot\\ln(d)',
  vars:[{k:'days',label:'Hari Sejak Genesis',min:500,max:6000,step:30,def:4500,unit:' hari'},{k:'a',label:'Intercept (a)',min:-10,max:10,step:0.1,def:-17.5,unit:''},{k:'b',label:'Slope (b)',min:1,max:10,step:0.1,def:5.8,unit:''}],
  calc(v){
    const logP=v.a+v.b*Math.log(v.days);
    const fairP=Math.exp(logP);
    const pts=sweep(500,6000,60,d=>Math.exp(v.a+v.b*Math.log(d)));
    return {big:fmtCompact(fairP),bigUnit:'$',bigLabel:'Harga Tren Log Regression',
      subs:[{l:'ln(P) Tren',v:fmtNum(logP,3)}],
      note:{type:'info',text:'Rainbow Chart menambahkan beberapa band standar deviasi di atas/bawah garis tren — zona merah (atas) = euforia; zona biru (bawah) = oversold historis.'},
      chart:{xMin:500,xMax:6000,yMin:0,yMax:Math.min(Math.max(...pts.map(p=>p.y)),500000),vline:v.days,series:[{label:'Log Regression Price',color:COLORS.amber,pts}]}}
  }
},
{id:'reserve-risk',ch:4,year:2020,who:'Hans Hauge',name:'Reserve Risk',
  desc:'Menyelaraskan harga pasar dengan "kepercayaan akumulatif" pemegang (HODL Bank) — nilai rendah menunjukkan keyakinan kuat vs harga, sinyal beli asimetris.',
  tex:'RR=\\frac{P}{\\text{HODL Bank}}',
  vars:[{k:'price',label:'Harga BTC Saat Ini',min:1000,max:150000,step:500,def:60000,unit:''},{k:'hodlBank',label:'HODL Bank (CDD Cumulative Est.)',min:100000,max:50000000,step:100000,def:10000000,unit:''}],
  calc(v){
    const rr=v.price/v.hodlBank;
    const pts=sweep(1000,150000,60,p=>p/v.hodlBank);
    return {big:fmtNum(rr*1e5,4),bigUnit:' (×10⁻⁵)',bigLabel:'Reserve Risk',
      subs:[{l:'Interpretasi',v: rr<5e-6?'Zona Beli':rr<2e-5?'Netral':'Zona Jual'}],
      note:{type: rr<5e-6?'good':rr>2e-5?'warn':'info',text: rr<5e-6?'Reserve Risk rendah: keyakinan pemegang sangat tinggi relatif harga — secara historis risk-reward sangat menarik.':rr>2e-5?'Reserve Risk tinggi: harga jauh melampaui "kepercayaan" pemegang kumulatif.':'Reserve Risk moderat.'},
      chart:{xMin:1000,xMax:150000,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.price,hlines:[{y:2e-5,color:COLORS.red,dash:true},{y:5e-6,color:COLORS.green,dash:true}],series:[{label:'Reserve Risk vs Harga',color:COLORS.violet,pts}]}}
  }
},
{id:'rhodl',ch:4,year:2020,who:'Philip Swift',name:'RHODL Ratio',
  desc:'Rasio dominasi kekayaan antara koin bergerak 1 hari–1 minggu (uang panas) vs koin diam 1–2 tahun (kapital lama) — mengukur dominasi HODLer jangka panjang.',
  tex:'RHODL=\\frac{RCW_{1d-1w}}{RCW_{1y-2y}}',
  vars:[{k:'shortBand',label:'Realized Cap Band 1d-1w (M$)',min:1,max:10000,step:10,def:500,unit:' M$'},{k:'longBand',label:'Realized Cap Band 1y-2y (M$)',min:1,max:10000,step:10,def:200,unit:' M$'}],
  calc(v){
    const ratio=v.shortBand/v.longBand;
    return {big:fmtNum(ratio,2),bigUnit:'×',bigLabel:'RHODL Ratio',
      subs:[{l:'Dominasi Uang Panas',v: ratio>3?'Sangat Tinggi':ratio>1.5?'Tinggi':'Rendah (HODLer dominan)'}],
      note:{type: ratio>3?'warn':ratio<1?'good':'info',text: ratio>3?'RHODL tinggi: uang spekulatif (short-term) mendominasi — zona distribusi/top historis.':ratio<1?'RHODL rendah: HODLer jangka panjang sangat dominan — kapitulasi uang panas selesai.':'RHODL moderat.'},
      chart:{mode:'bars',decimals:0,unit:' M$',bars:[{label:'1d-1w Band (Uang Panas)',value:v.shortBand,color:COLORS.red},{label:'1y-2y Band (HODLer)',value:v.longBand,color:COLORS.green}]}}
  }
},
{id:'liveliness',ch:4,year:2020,who:'Glassnode',name:'Liveliness & Vaultedness',
  desc:'Liveliness mengukur apakah siklus didominasi pengeluaran (spending) atau penimbunan (vaulting) koin-hari. Vaultedness = 1 − Liveliness.',
  tex:'L=\\frac{\\sum CDD}{\\sum CD\\ created},\\quad V=1-L',
  vars:[{k:'totalCDD',label:'Total CDD Kumulatif',min:1e8,max:1e12,step:1e9,def:5e10,unit:''},{k:'totalCDCreated',label:'Total CD Created Kumulatif',min:1e9,max:1e13,step:1e10,def:2e11,unit:''}],
  calc(v){
    const L=Math.min(v.totalCDD/v.totalCDCreated,1);
    const V=1-L;
    return {big:fmtNum(L,4),bigUnit:'',bigLabel:'Liveliness',
      subs:[{l:'Vaultedness',v:fmtNum(V,4)},{l:'Siklus Dominan',v: L>0.6?'Spending / Distribusi':'Vaulting / Akumulasi'}],
      note:{type: L>0.6?'warn':L<0.4?'good':'info',text: L>0.6?'Liveliness tinggi: siklus distribusi dominan, pemegang lama aktif menjual.':'Liveliness rendah: akumulasi/penimbunan dominan, koin-hari terus bertambah.'},
      chart:{mode:'bars',decimals:4,bars:[{label:'Liveliness (L)',value:L,color:COLORS.red},{label:'Vaultedness (V)',value:V,color:COLORS.green}]}}
  }
},
{id:'lth-sth-sopr',ch:4,year:2020,who:'Glassnode',name:'LTH vs STH SOPR',
  desc:'Membandingkan profit/loss realisasi antara pemegang jangka panjang (>155 hari) dan jangka pendek (<155 hari) — divergensi keduanya menandai perubahan fase pasar.',
  tex:'SOPR_{LTH}=\\frac{RC^{LTH}_{realized}}{RC^{LTH}_{created}}',
  vars:[{k:'lthSopr',label:'LTH-SOPR',min:0.5,max:5,step:0.01,def:2.1,unit:''},{k:'sthSopr',label:'STH-SOPR',min:0.7,max:1.5,step:0.01,def:0.97,unit:''}],
  calc(v){
    const divergence=v.lthSopr-v.sthSopr;
    return {big:fmtNum(divergence,3),bigUnit:'',bigLabel:'Divergensi LTH−STH SOPR',
      subs:[{l:'LTH-SOPR',v:fmtNum(v.lthSopr,3)+' ('+( v.lthSopr>1?'profit':'loss')+')'},{l:'STH-SOPR',v:fmtNum(v.sthSopr,3)+' ('+(v.sthSopr>1?'profit':'loss')+')'}],
      note:{type: v.lthSopr>1.5&&v.sthSopr<1?'warn':v.lthSopr>1&&v.sthSopr>1?'good':'info',text: v.lthSopr>1.5&&v.sthSopr<1?'LTH profit besar sementara STH rugi — fase distribusi klasik: pemegang lama jual ke pemegang baru yang panik.':v.lthSopr>1&&v.sthSopr>1?'Kedua kelompok profit — fase bull market sehat.':'Analisis lebih lanjut diperlukan.'},
      chart:{mode:'bars',decimals:3,bars:[{label:'LTH-SOPR',value:v.lthSopr,color:COLORS.amber},{label:'STH-SOPR',value:v.sthSopr,color:COLORS.cyan},{label:'Divergensi',value:divergence,color:COLORS.violet}]}}
  }
},
{id:'ssr',ch:4,year:2020,who:'Glassnode',name:'SSR Ratio',
  desc:'Stablecoin Supply Ratio — potensi buying power agregat berdasarkan rasio supply stablecoin terhadap kapitalisasi BTC. SSR rendah = lebih banyak amunisi beli.',
  tex:'SSR=\\frac{\\text{BTC Market Cap}}{\\text{Stablecoin Supply}}',
  vars:[{k:'btcMcap',label:'BTC Market Cap (B$)',min:10,max:2000,step:5,def:1200,unit:' B$'},{k:'stableSupply',label:'Total Stablecoin Supply (B$)',min:1,max:500,step:1,def:170,unit:' B$'}],
  calc(v){
    const ssr=v.btcMcap/v.stableSupply;
    const pts=sweep(1,500,60,ss=>v.btcMcap/ss);
    return {big:fmtNum(ssr,1),bigUnit:'×',bigLabel:'SSR Ratio',
      subs:[{l:'Stablecoin Supply',v:fmtNum(v.stableSupply,0)+' B$'},{l:'Buying Power Relatif',v: ssr<5?'Sangat Tinggi':ssr<10?'Tinggi':ssr<20?'Moderat':'Rendah'}],
      note:{type: ssr<5?'good':ssr>15?'warn':'info',text: ssr<5?'SSR sangat rendah: stablecoin berlimpah relatif BTC — potensi daya beli terpendam tinggi, kondisi bullish.':ssr>15?'SSR tinggi: daya beli stablecoin sudah terserap signifikan — amunisi beli mulai terbatas.':'SSR moderat.'},
      chart:{xMin:1,xMax:500,yMin:0,yMax:Math.min(Math.max(...pts.map(p=>p.y)),50),vline:v.stableSupply,hlines:[{y:5,color:COLORS.green,dash:true},{y:15,color:COLORS.red,dash:true}],series:[{label:'SSR vs Stablecoin Supply',color:COLORS.cyan,pts}]}}
  }
},
{id:'altcoin-season',ch:4,year:2021,who:'Blockchain Center',name:'Altcoin Season Index',
  desc:'Peta navigasi aliran modal pasca penurunan Bitcoin Dominance — mengidentifikasi apakah pasar berada di fase "BTC Season" atau "Alt Season".',
  tex:'ASI=\\frac{\\text{# Altcoins Outperform BTC (90d)}}{75}\\times 100',
  vars:[{k:'outperformers',label:'Jumlah Altcoin Outperform BTC (dari 75)',min:0,max:75,step:1,def:40,unit:''},{k:'btcDom',label:'BTC Dominance',min:30,max:70,step:0.5,def:52,unit:'%'}],
  calc(v){
    const asi=v.outperformers/75*100;
    return {big:fmtNum(asi,0),bigUnit:'/100',bigLabel:'Altcoin Season Index',
      subs:[{l:'BTC Dominance',v:fmtNum(v.btcDom,1)+'%'},{l:'Fase Pasar',v: asi>75?'🔥 Altcoin Season':asi<25?'₿ Bitcoin Season':'Netral'}],
      note:{type: asi>75?'good':asi<25?'warn':'info',text: asi>75?'Altcoin Season: >75% altcoin top-100 outperform BTC dalam 90 hari — momentum altcoin sangat kuat.':asi<25?'Bitcoin Season: BTC mendominasi, sebagian besar altcoin underperform — modal terkonsentrasi di BTC.':'Pasar netral: tidak ada dominasi jelas.'},
      chart:{mode:'bars',decimals:0,bars:[{label:'Altcoin Outperform BTC',value:v.outperformers,color:COLORS.green},{label:'Altcoin Underperform',value:75-v.outperformers,color:COLORS.red}]}}
  }
},
{id:'fx-intervention',ch:4,year:2022,who:'Central Banks / Quants',name:'FX Intervention Model',
  desc:'Menghitung dampak sterilisasi cadangan devisa saat bank sentral mengintervensi pasar spot untuk menstabilkan volatilitas kurs.',
  tex:'\\Delta R=-\\alpha\\cdot(e_t-e^*)\\cdot\\sigma_{FX}\\cdot V_{daily}',
  vars:[{k:'dev',label:'Deviasi Kurs dari Target (%)',min:0,max:20,step:0.5,def:5,unit:'%'},{k:'alpha',label:'Intensitas Intervensi (α)',min:0.1,max:1,step:0.05,def:0.5,unit:''},{k:'sigma',label:'Volatilitas FX Harian',min:0.1,max:3,step:0.1,def:0.8,unit:'%'},{k:'volDaily',label:'Volume Pasar FX Harian',min:100,max:5000,step:50,def:1000,unit:' M$'}],
  calc(v){
    const dR=v.alpha*(v.dev/100)*v.sigma/100*v.volDaily;
    const pts=sweep(0,20,60,d=>v.alpha*(d/100)*v.sigma/100*v.volDaily);
    return {big:fmtNum(dR,0),bigUnit:' M$',bigLabel:'Pengeluaran Cadangan Devisa',
      subs:[{l:'% dari Volume Harian',v:fmtNum(dR/v.volDaily*100,2)+'%'}],
      note:{type: dR/v.volDaily>0.1?'warn':'info',text: dR/v.volDaily>0.1?'Intervensi besar: bank sentral perlu menyerap >10% volume harian — cadangan devisa terancam terkuras cepat.':'Intervensi moderat: dalam batas kapasitas normal bank sentral.'},
      chart:{xMin:0,xMax:20,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.15,vline:v.dev,series:[{label:'Pengeluaran Cadangan vs Deviasi Kurs',color:COLORS.cyan,pts}]}}
  }
},
{id:'etf-flow',ch:4,year:2024,who:'TradFi Quants',name:'Spot ETF Flow Impact',
  desc:'Model transmisi likuiditas T+1 yang mensimulasikan dampak injeksi aliran modal institusional via Spot Bitcoin ETF terhadap harga spot underlying.',
  tex:'\\Delta P=\\frac{\\text{ETF Inflow}}{\\text{Daily BTC Volume}}\\cdot\\text{Price Elasticity}',
  vars:[{k:'inflow',label:'ETF Daily Inflow',min:0,max:2000,step:10,def:300,unit:' M$'},{k:'btcVol',label:'Volume BTC Spot Harian',min:100,max:20000,step:100,def:5000,unit:' M$'},{k:'elasticity',label:'Elastisitas Harga',min:0.1,max:3,step:0.1,def:1.2,unit:''},{k:'btcPrice',label:'Harga BTC Saat Ini',min:20000,max:150000,step:1000,def:60000,unit:''}],
  calc(v){
    const ratio=v.inflow/v.btcVol;
    const pctImpact=ratio*v.elasticity*100;
    const newPrice=v.btcPrice*(1+pctImpact/100);
    const pts=sweep(0,2000,60,inf=>inf/v.btcVol*v.elasticity*100);
    return {big:fmtNum(pctImpact,2),bigUnit:'%',bigLabel:'Estimasi Dampak Harga T+1',
      subs:[{l:'Harga Prediksi',v:fmtCompact(newPrice)+'$'},{l:'Rasio Inflow/Volume',v:fmtNum(ratio*100,2)+'%'}],
      note:{type: pctImpact>3?'good':'info',text: pctImpact>3?'Inflow ETF signifikan: tekanan beli terstruktur dari institusi berpotensi mendorong harga spot naik >3% dalam T+1.':'Dampak harga moderat dari aliran ETF pada level ini.'},
      chart:{xMin:0,xMax:2000,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.15,vline:v.inflow,series:[{label:'Dampak Harga (%) vs ETF Inflow (M$)',color:COLORS.amber,pts}]}}
  }
},
{id:'crypto-fx-corr',ch:4,year:2018,who:'Macro Strategists',name:'Crypto-FX Correlation',
  desc:'Hubungan beta antara likuiditas Dollar global (DXY) dan aset kripto pro-risiko — korelasi negatif berarti penguatan dolar menekan harga kripto, dan sebaliknya.',
  tex:'\\beta_{crypto,DXY}=\\frac{Cov(R_{crypto},R_{DXY})}{Var(R_{DXY})}',
  vars:[
    {k:'dxyChange',label:'Perubahan DXY',min:-5,max:5,step:0.1,def:1.5,unit:'%'},
    {k:'beta',label:'Beta Kripto terhadap DXY',min:-5,max:0,step:0.1,def:-2.2,unit:''},
    {k:'btcPrice',label:'Harga BTC Saat Ini',min:10000,max:150000,step:1000,def:60000,unit:''}
  ],
  calc(v){
    const cryptoChange=v.beta*v.dxyChange;
    const newPrice=v.btcPrice*(1+cryptoChange/100);
    const pts=sweep(-5,5,60,dxy=>v.beta*dxy);
    return {big:fmtNum(cryptoChange,2),bigUnit:'%',bigLabel:'Estimasi Dampak ke Kripto',
      subs:[{l:'Perubahan DXY',v:fmtNum(v.dxyChange,2)+'%'},{l:'Harga BTC Prediksi',v:fmtCompact(newPrice)+'$'}],
      note:{type: v.dxyChange>0?'warn':'good',text: v.dxyChange>0?'DXY menguat: tekanan likuiditas global memberatkan aset pro-risiko seperti kripto (beta negatif khas).':'DXY melemah: kondisi likuiditas longgar historis mendukung penguatan aset kripto.'},
      chart:{xMin:-5,xMax:5,yMin:Math.min(...pts.map(p=>p.y))-1,yMax:Math.max(...pts.map(p=>p.y))+1,vline:v.dxyChange,hlines:[{y:0,color:COLORS.faint,dash:true}],series:[{label:'Perubahan Kripto (%) vs Perubahan DXY (%)',color:COLORS.red,pts}]}}
  }
},
{id:'thermocap',ch:4,year:2019,who:'Nic Carter',name:'Bitcoin Thermocap',
  desc:'Akumulasi total subsidi blok (block reward) sepanjang sejarah jaringan — memvalidasi "biaya intrinsik" keamanan jaringan, basis rasio valuasi Market Cap/Thermocap.',
  tex:'Thermocap=\\sum_{t=0}^{T}(\\text{Block Reward}_t\\times P_t)',
  vars:[
    {k:'thermocap',label:'Thermocap Kumulatif (B$)',min:1,max:100,step:1,def:55,unit:' B$'},
    {k:'mcap',label:'Market Cap Saat Ini (B$)',min:10,max:3000,step:10,def:1200,unit:' B$'}
  ],
  calc(v){
    const ratio=v.mcap/v.thermocap;
    const pts=sweep(10,3000,60,mc=>mc/v.thermocap);
    return {big:fmtNum(ratio,1),bigUnit:'×',bigLabel:'Market Cap / Thermocap Ratio',
      subs:[{l:'Thermocap',v:fmtNum(v.thermocap,1)+' B$'},{l:'Market Cap',v:fmtNum(v.mcap,0)+' B$'}],
      note:{type: ratio>15?'warn':ratio<5?'good':'info',text: ratio>15?'Rasio tinggi: valuasi pasar jauh melampaui total biaya keamanan historis jaringan — zona euforia historis.':ratio<5?'Rasio rendah: harga mendekati "biaya intrinsik" jaringan — zona undervalued historis.':'Rasio dalam kisaran wajar historis.'},
      chart:{xMin:10,xMax:3000,yMin:0,yMax:Math.min(Math.max(...pts.map(p=>p.y)),50),vline:v.mcap,hlines:[{y:15,color:COLORS.red,dash:true},{y:5,color:COLORS.green,dash:true}],series:[{label:'MCap/Thermocap vs Market Cap',color:COLORS.amber,pts}]}}
  }
}
]);

/* ===================== BAB 5: MARKET STRUCTURE, ARBITRAGE & DeFi (28) ===================== */
addF([
{id:'cirp',ch:5,year:1923,who:'John Maynard Keynes',name:'Covered Interest Rate Parity',
  desc:'Arbitrase risk-free menggunakan kontrak forward untuk mengunci selisih suku bunga antar mata uang — basis pricing seluruh pasar FX forward global.',
  tex:'F=S\\cdot\\frac{(1+r_d)}{(1+r_f)}',
  vars:[{k:'S',label:'Spot Rate',min:0.5,max:20000,step:1,def:15900,unit:''},{k:'rd',label:'Suku Bunga Domestik (r_d)',min:0,max:20,step:0.25,def:6,unit:'%'},{k:'rf',label:'Suku Bunga Asing (r_f)',min:0,max:20,step:0.25,def:5.5,unit:'%'},{k:'T',label:'Tenor (th)',min:0.25,max:2,step:0.25,def:1,unit:''}],
  calc(v){
    const F=v.S*Math.pow((1+v.rd/100)/(1+v.rf/100),v.T);
    const fwdPts=(F-v.S)/v.S*10000;
    const pts=sweep(0.25,2,40,t=>v.S*Math.pow((1+v.rd/100)/(1+v.rf/100),t));
    return {big:fmtNum(F,2),bigUnit:'',bigLabel:'Harga Forward CIRP',
      subs:[{l:'Forward Points',v:fmtNum(fwdPts,0)+' bps'},{l:'Imbal Carry',v:fmtNum(v.rd-v.rf,2)+'%'}],
      note:{type:'info',text:'Setiap penyimpangan dari CIRP menghadirkan arbitrase risk-free yang langsung dieksploitasi trader — salah satu paritas paling ketat di pasar keuangan.'},
      chart:{xMin:0.25,xMax:2,yMin:Math.min(...pts.map(p=>p.y))*0.99,yMax:Math.max(...pts.map(p=>p.y))*1.01,vline:v.T,series:[{label:'Harga Forward vs Tenor',color:COLORS.violet,pts}]}}
  }
},
{id:'fx-microstructure',ch:5,year:1991,who:'Richard Lyons',name:'FX Microstructure',
  desc:'Mengungkap asimetri informasi dan order book imbalances yang menggerakkan kurs OTC — order flow merupakan transmisi utama informasi ke dalam harga FX.',
  tex:'\\Delta P_t=\\lambda\\cdot Q_t+\\varepsilon_t',
  vars:[{k:'orderFlow',label:'Order Flow Bersih (M$)',min:-500,max:500,step:10,def:100,unit:' M$'},{k:'lambda',label:'Dampak Harga (λ bps/M$)',min:0.01,max:1,step:0.01,def:0.2,unit:''},{k:'sigma',label:'Noise Pasar (bps)',min:0,max:20,step:0.5,def:5,unit:' bps'}],
  calc(v){
    const impact=v.lambda*v.orderFlow;
    const pts=sweep(-500,500,60,q=>v.lambda*q);
    return {big:fmtNum(impact,2),bigUnit:' bps',bigLabel:'Dampak Harga dari Order Flow',
      subs:[{l:'Arah',v: v.orderFlow>0?'Net Buyer (Up Pressure)':'Net Seller (Down Pressure)'}],
      note:{type:'info',text:'Penelitian Lyons menunjukkan ~90% pergerakan kurs intraday bisa dijelaskan oleh order flow, bukan oleh berita fundamental langsung.'},
      chart:{xMin:-500,xMax:500,yMin:Math.min(...pts.map(p=>p.y))-2,yMax:Math.max(...pts.map(p=>p.y))+2,vline:v.orderFlow,hlines:[{y:0,color:COLORS.faint,dash:true}],series:[{label:'Dampak Harga (bps) vs Order Flow',color:COLORS.violet,pts}]}}
  }
},
{id:'pow-difficulty',ch:5,year:2008,who:'Satoshi Nakamoto',name:'Proof of Work Difficulty',
  desc:'Sinkronisasi algoritmik terdesentralisasi yang menjaga penerbitan blok rata-rata 10 menit — setiap 2016 blok, difficulty disesuaikan otomatis berdasarkan waktu aktual.',
  tex:'D_{new}=D_{old}\\cdot\\frac{2016\\times 600s}{T_{actual}}',
  vars:[{k:'D_old',label:'Difficulty Saat Ini',min:1e13,max:1e15,step:1e13,def:9e13,unit:''},{k:'T_actual',label:'Waktu Aktual 2016 Blok (hari)',min:10,max:30,step:0.5,def:13,unit:' hari'}],
  calc(v){
    const target=14*24*3600, actual=v.T_actual*24*3600;
    const D_new=v.D_old*(target/actual);
    const change=(D_new/v.D_old-1)*100;
    const pts=sweep(10,30,60,t=>v.D_old*(target/(t*24*3600)));
    return {big:fmtNum(change,2),bigUnit:'%',bigLabel:'Perubahan Difficulty',
      subs:[{l:'Difficulty Baru',v:fmtCompact(D_new)},{l:'Waktu Target',v:'14 hari'}],
      note:{type: change>10?'warn':change<-10?'good':'info',text: change>10?'Difficulty naik signifikan: blok diproduksi terlalu cepat, lebih banyak hashpower masuk.':change<-10?'Difficulty turun: penambang exit, jaringan memperlambat laju mining.':'Penyesuaian normal.'},
      chart:{xMin:10,xMax:30,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.T_actual,series:[{label:'Difficulty Baru vs Waktu Aktual',color:COLORS.amber,pts}]}}
  }
},
{id:'utxo',ch:5,year:2008,who:'Satoshi Nakamoto',name:'UTXO Model',
  desc:'Model grafis anti double-spending berbasis status keluaran transaksi tak terpakai — setiap output hanya bisa digunakan sekali sebagai input transaksi berikutnya.',
  tex:'\\sum Inputs = \\sum Outputs + Fee',
  vars:[{k:'input1',label:'Input UTXO 1',min:0,max:10,step:0.001,def:1.5,unit:' BTC'},{k:'input2',label:'Input UTXO 2',min:0,max:10,step:0.001,def:0.3,unit:' BTC'},{k:'out1',label:'Output Tujuan',min:0,max:10,step:0.001,def:1.2,unit:' BTC'},{k:'feeRate',label:'Fee Rate',min:1,max:500,step:1,def:15,unit:' sat/vB'}],
  calc(v){
    const totalIn=v.input1+v.input2;
    const txSize=225;
    const fee=v.feeRate*txSize/1e8;
    const change=totalIn-v.out1-fee;
    return {big:fmtNum(change,6),bigUnit:' BTC',bigLabel:'Output Kembalian (Change UTXO)',
      subs:[{l:'Total Input',v:fmtNum(totalIn,4)+' BTC'},{l:'Fee Transaksi',v:fmtNum(fee*1e8,0)+' sat ≈ '+fmtNum(fee,6)+' BTC'}],
      note:{type: change<0?'warn':'good',text: change<0?'INVALID: total output + fee melebihi total input — transaksi akan ditolak node jaringan.':'UTXO valid: kembalian akan masuk dompet sebagai UTXO baru yang bisa digunakan berikutnya.'},
      chart:{mode:'bars',decimals:4,unit:' BTC',bars:[{label:'Input 1',value:v.input1,color:COLORS.amber},{label:'Input 2',value:v.input2,color:COLORS.amber},{label:'Output Tujuan',value:v.out1,color:COLORS.cyan},{label:'Fee',value:fee,color:COLORS.red},{label:'Change',value:Math.max(change,0),color:COLORS.green}]}}
  }
},
{id:'bonding-curve',ch:5,year:2017,who:'Simon de la Rouviere',name:'Bonding Curve',
  desc:'Hubungan matematis kontinu antara pencetakan token dan persediaan cadangan — AMM pertama yang memungkinkan harga otomatis tanpa order book.',
  tex:'P(s)=k\\cdot s^m,\\quad R=\\int_0^s P\\,ds=\\frac{k\\cdot s^{m+1}}{m+1}',
  vars:[{k:'supply',label:'Total Supply Saat Ini (s)',min:100,max:10000,step:100,def:1000,unit:''},{k:'k',label:'Konstanta (k)',min:0.0001,max:0.1,step:0.0001,def:0.01,unit:''},{k:'m',label:'Eksponen Kurva (m)',min:0.5,max:3,step:0.1,def:1,unit:''},{k:'dS',label:'Token yang Ingin Dibeli (ΔS)',min:1,max:1000,step:1,def:100,unit:''}],
  calc(v){
    const P=v.k*Math.pow(v.supply,v.m);
    const R=v.k*Math.pow(v.supply,v.m+1)/(v.m+1);
    const newS=v.supply+v.dS;
    const cost=v.k*Math.pow(newS,v.m+1)/(v.m+1)-R;
    const avgPrice=cost/v.dS;
    const pts=sweep(0,v.supply*2,60,s=>v.k*Math.pow(s,v.m));
    return {big:fmtNum(P,4),bigUnit:'',bigLabel:'Harga Token Saat Ini P(s)',
      subs:[{l:'Biaya Beli '+v.dS+' Token',v:fmtNum(cost,4)},{l:'Harga Rata-rata Pembelian',v:fmtNum(avgPrice,4)}],
      note:{type:'info',text:'Setiap pembelian menaikan harga secara deterministik — tidak ada spread/slippage tersembunyi. Penjual menerima token baru, pembeli menyetor cadangan ke kontrak.'},
      chart:{xMin:0,xMax:v.supply*2,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.supply,series:[{label:'Kurva Harga P(s)',color:COLORS.violet,pts}]}}
  }
},
{id:'amm-cpmm',ch:5,year:2018,who:'Buterin, Adams',name:'Constant Product AMM (x·y=k)',
  desc:'Paradigma pembuat pasar otomatis dengan invariant x·y=k — harga terbentuk murni dari rasio dua token dalam pool, tanpa perlu order book TradFi.',
  tex:'x\\cdot y=k,\\quad \\Delta y=-\\frac{y\\cdot\\Delta x}{x+\\Delta x}',
  vars:[{k:'x0',label:'Reserve Token X (ETH)',min:1,max:10000,step:1,def:1000,unit:''},{k:'y0',label:'Reserve Token Y (USDC)',min:1,max:10000000,step:1000,def:2000000,unit:''},{k:'dx',label:'Trade: Jual ΔX (ETH)',min:0.1,max:500,step:0.1,def:10,unit:''}],
  calc(v){
    const k=v.x0*v.y0;
    const x1=v.x0+v.dx;
    const y1=k/x1;
    const dy=v.y0-y1;
    const midPrice=v.y0/v.x0;
    const execPrice=dy/v.dx;
    const slip=(execPrice/midPrice-1)*100;
    const pts=sweep(1,v.x0*2,60,x=>k/x);
    return {big:fmtNum(dy,2),bigUnit:' USDC',bigLabel:'USDC Diterima',
      subs:[{l:'Harga Mid Market',v:fmtNum(midPrice,2)+' USDC/ETH'},{l:'Harga Eksekusi',v:fmtNum(execPrice,2)+' USDC/ETH'},{l:'Price Impact/Slippage',v:fmtNum(Math.abs(slip),3)+'%'}],
      note:{type: Math.abs(slip)>2?'warn':Math.abs(slip)>0.5?'info':'good',text: Math.abs(slip)>2?'Price impact besar: trade terlalu besar relatif pool — pertimbangkan split order atau routing multi-hop.':'Slippage minimal pada ukuran trade ini.'},
      chart:{xMin:1,xMax:v.x0*2,yMin:0,yMax:v.y0*1.2,vline:v.x0,series:[{label:'Kurva AMM x·y=k',color:COLORS.green,pts}]}}
  }
},
{id:'perp-funding',ch:5,year:2018,who:'Hayes / BitMEX',name:'Perpetual Funding Rate',
  desc:'Ekuilibrium suku bunga bayaran yang mengikat harga perpetual futures agar konvergen ke harga spot — pembayaran tiap 8 jam dari holder long ke short atau sebaliknya.',
  tex:'FR=\\text{clamp}\\Big(\\frac{P_{mark}-P_{index}}{P_{index}},\\pm 0.05\\%\\Big)',
  vars:[{k:'pMark',label:'Harga Mark (Perpetual)',min:10000,max:150000,step:100,def:62000,unit:''},{k:'pIndex',label:'Harga Index (Spot)',min:10000,max:150000,step:100,def:61500,unit:''}],
  calc(v){
    const raw=(v.pMark-v.pIndex)/v.pIndex*100;
    const fr=Math.max(-0.05,Math.min(0.05,raw));
    const annualized=fr*3*365;
    const pts=sweep(v.pIndex*0.9,v.pIndex*1.1,60,pm=>{const r=(pm-v.pIndex)/v.pIndex*100; return Math.max(-0.05,Math.min(0.05,r));});
    return {big:fmtNum(fr,4),bigUnit:'%',bigLabel:'Funding Rate per 8 Jam',
      subs:[{l:'Annualized',v:fmtNum(annualized,2)+'%'},{l:'Arah Pembayaran',v: fr>0?'Long bayar Short':'Short bayar Long'}],
      note:{type: Math.abs(fr)>0.04?'warn':'info',text: Math.abs(fr)>0.04?'Funding rate mendekati cap — sinyal pasar satu arah ekstrem (overleveraged). Pertimbangkan funding arbitrage.':'Funding rate normal — premium/diskon wajar antara perp vs spot.'},
      chart:{xMin:v.pIndex*0.9,xMax:v.pIndex*1.1,yMin:-0.06,yMax:0.06,vline:v.pMark,hlines:[{y:0,color:COLORS.faint,dash:true}],series:[{label:'Funding Rate (%) vs Harga Mark',color:COLORS.amber,pts}]}}
  }
},
{id:'il',ch:5,year:2020,who:'DeFi Quants',name:'Impermanent Loss',
  desc:'Matriks kerugian absolut efisiensi penyedia likuiditas AMM dibandingkan strategi HODL murni — muncul karena arbitrageur rebalancing pool secara kontinu.',
  tex:'IL=\\frac{2\\sqrt{r}}{1+r}-1,\\quad r=\\frac{P_{new}}{P_{initial}}',
  vars:[{k:'priceChange',label:'Perubahan Harga Token X',min:-90,max:500,step:5,def:100,unit:'%'}],
  calc(v){
    const r=1+v.priceChange/100;
    const il=(2*Math.sqrt(r)/(1+r)-1)*100;
    const pts=sweep(-90,500,80,pc=>{const rr=1+pc/100; return (2*Math.sqrt(rr)/(1+rr)-1)*100;});
    return {big:fmtNum(il,2),bigUnit:'%',bigLabel:'Impermanent Loss vs HODL',
      subs:[{l:'Rasio Harga Baru (r)',v:fmtNum(r,2)+'×'},{l:'Value LP (HODL=100)',v:fmtNum(100+il,2)}],
      note:{type: Math.abs(il)>10?'warn':Math.abs(il)>5?'info':'good',text: Math.abs(il)>10?'IL signifikan: pastikan fee APR yang diperoleh dari pool melebihi IL ini agar LP menguntungkan.':'IL kecil pada level perubahan harga ini — fee LP biasanya mengkompensasi.'},
      chart:{xMin:-90,xMax:500,yMin:Math.min(...pts.map(p=>p.y))-1,yMax:1,vline:v.priceChange,hlines:[{y:0,color:COLORS.faint,dash:true}],series:[{label:'Impermanent Loss (%) vs Perubahan Harga',color:COLORS.red,pts}]}}
  }
},
{id:'liq-mining',ch:5,year:2020,who:'Synthetix, Compound',name:'Liquidity Mining APY',
  desc:'Formula inflasi jaringan protokol yang didistribusikan sebagai subsidi akuisisi likuiditas (yield farming) — APY nyata harus dikurangi dilusi token reward.',
  tex:'APY=\\frac{R_{daily}\\times P_{token}}{TVL}\\times 365\\times 100',
  vars:[{k:'rewardDaily',label:'Reward Harian (token)',min:100,max:100000,step:100,def:10000,unit:''},{k:'tokenPrice',label:'Harga Token Reward',min:0.01,max:100,step:0.01,def:2,unit:'$'},{k:'tvl',label:'TVL Pool (M$)',min:0.1,max:1000,step:1,def:10,unit:' M$'}],
  calc(v){
    const apy=v.rewardDaily*v.tokenPrice/(v.tvl*1e6)*365*100;
    const pts=sweep(0.1,1000,60,tvl=>v.rewardDaily*v.tokenPrice/(tvl*1e6)*365*100);
    return {big:fmtNum(apy,1),bigUnit:'%',bigLabel:'APY Liquidity Mining',
      subs:[{l:'Reward Harian (USD)',v:fmtCompact(v.rewardDaily*v.tokenPrice)+'$'},{l:'TVL',v:fmtCompact(v.tvl)+' M$'}],
      note:{type: apy>200?'warn':'info',text: apy>200?'APY sangat tinggi biasanya tidak sustainable — harga token reward cenderung tertekan oleh penjualan miner/farmer.':apy>30?'APY menarik — pastikan risiko smart contract dan dilusi tokenomics diperhitungkan.':'APY modest, lebih sustainable jangka panjang.'},
      chart:{xMin:0.1,xMax:1000,yMin:0,yMax:Math.min(Math.max(...pts.map(p=>p.y)),500),vline:v.tvl,series:[{label:'APY vs TVL',color:COLORS.green,pts}]}}
  }
},
{id:'aave-rate',ch:5,year:2020,who:'Kulechov, Leshner',name:'Aave/Compound Interest Rate',
  desc:'Suku bunga money market adaptif berdasarkan rasio utilisasi pool peminjaman — suku bunga naik cepat saat utilisasi mendekati ambang optimal untuk menarik deposan.',
  tex:'R_{borrow}=R_{base}+\\frac{U}{U_{opt}}R_{slope1}\\ (U\\le U_{opt})',
  vars:[{k:'U',label:'Utilisasi Pool (%)',min:0,max:100,step:1,def:70,unit:'%'},{k:'Uopt',label:'Utilisasi Optimal (%)',min:50,max:95,step:5,def:80,unit:'%'},{k:'Rbase',label:'Base Rate',min:0,max:5,step:0.1,def:0.5,unit:'%'},{k:'Rslope1',label:'Slope 1 (U ≤ Uopt)',min:0,max:20,step:0.5,def:4,unit:'%'},{k:'Rslope2',label:'Slope 2 (U > Uopt)',min:0,max:200,step:5,def:75,unit:'%'}],
  calc(v){
    function rate(U){
      if(U<=v.Uopt) return v.Rbase+U/v.Uopt*v.Rslope1;
      return v.Rbase+v.Rslope1+(U-v.Uopt)/(100-v.Uopt)*v.Rslope2;
    }
    const borrow=rate(v.U);
    const supply=borrow*v.U/100*0.9;
    const pts=sweep(0,100,80,rate);
    return {big:fmtNum(borrow,2),bigUnit:'%',bigLabel:'Borrow APR',
      subs:[{l:'Supply APY (deposan)',v:fmtNum(supply,2)+'%'},{l:'Utilisasi Pool',v:fmtNum(v.U,1)+'%'}],
      note:{type: v.U>v.Uopt?'warn':'info',text: v.U>v.Uopt?'Utilisasi melampaui optimal: Slope 2 sangat curam — suku bunga tinggi mendorong deposan masuk dan peminjam keluar untuk rebalancing.':'Utilisasi di bawah optimal: suku bunga rendah, masih ada kapasitas meminjam.'},
      chart:{xMin:0,xMax:100,yMin:0,yMax:Math.min(Math.max(...pts.map(p=>p.y)),100),vline:v.U,hlines:[{y:0,color:COLORS.faint,dash:true}],series:[{label:'Borrow Rate (%) vs Utilisasi',color:COLORS.cyan,pts}]}}
  }
},
{id:'univ3',ch:5,year:2021,who:'Adams et al. (Uniswap)',name:'Uniswap v3 CLMM',
  desc:'Injeksi likuiditas di interval rentang harga arbitrer — LP menyediakan likuiditas hanya dalam [P_low, P_high], meningkatkan efisiensi modal vs v2 hingga 4000×.',
  tex:'L=\\frac{\\Delta x}{\\sqrt{P_{high}}-\\sqrt P},\\quad\\text{Capital Eff}=\\frac{P_{range}}{P_{full}}',
  vars:[{k:'P',label:'Harga Saat Ini',min:1000,max:10000,step:50,def:3500,unit:' USDC'},{k:'Plo',label:'Batas Bawah Range (P_low)',min:500,max:9000,step:50,def:3000,unit:' USDC'},{k:'Phi',label:'Batas Atas Range (P_high)',min:2000,max:15000,step:50,def:4000,unit:' USDC'},{k:'L',label:'Likuiditas Disediakan (L)',min:100,max:100000,step:100,def:10000,unit:''}],
  calc(v){
    if(v.Plo>=v.Phi||v.P<v.Plo||v.P>v.Phi){
      const note={type:'warn',text:'Harga saat ini di luar range — LP tidak aktif dan tidak menghasilkan fee.'};
      return {big:'INACTIVE',bigUnit:'',bigLabel:'Status LP',subs:[],note,chart:{mode:'bars',bars:[{label:'P_low',value:v.Plo,color:COLORS.faint},{label:'P_current',value:v.P,color:COLORS.red},{label:'P_high',value:v.Phi,color:COLORS.faint}]}};
    }
    const x=v.L*(Math.sqrt(v.Phi)-Math.sqrt(v.P))/(Math.sqrt(v.P)*Math.sqrt(v.Phi));
    const y=v.L*(Math.sqrt(v.P)-Math.sqrt(v.Plo));
    const fullRangeEff=Math.sqrt(v.Phi/v.Plo)-1;
    const capitalEff=1/fullRangeEff;
    return {big:fmtNum(capitalEff,1),bigUnit:'×',bigLabel:'Efisiensi Modal vs v2',
      subs:[{l:'Token X dalam Range',v:fmtNum(x,4)},{l:'Token Y (USDC) dalam Range',v:fmtNum(y,2)}],
      note:{type:'good',text:'Range lebih sempit = efisiensi modal lebih tinggi, tapi risiko keluar range juga meningkat. LP aktif hanya saat P berada dalam [P_low, P_high].'},
      chart:{mode:'bars',bars:[{label:'P_low',value:v.Plo,color:COLORS.faint},{label:'P_current',value:v.P,color:COLORS.amber},{label:'P_high',value:v.Phi,color:COLORS.faint}]}}
  }
},
{id:'ve-token',ch:5,year:2021,who:'Michael Egorov (Curve)',name:'ve-Tokenomics',
  desc:'Desain asimetris hak suara yang mengunci modal ventura — voting power berbanding lurus dengan jumlah token dan durasi penguncian, memberi insentif loyalitas jangka panjang.',
  tex:'vePower=\\text{amount}\\times\\frac{t_{lock}}{t_{max}}',
  vars:[{k:'amount',label:'Token Dikunci',min:1000,max:1000000,step:1000,def:100000,unit:''},{k:'lockYears',label:'Durasi Penguncian',min:0.25,max:4,step:0.25,def:2,unit:' th'},{k:'totalVe',label:'Total veToken di Protokol',min:1e6,max:1e9,step:1e6,def:50e6,unit:''}],
  calc(v){
    const maxYears=4;
    const vePow=v.amount*(v.lockYears/maxYears);
    const votingShare=vePow/v.totalVe*100;
    const pts=sweep(0.25,4,40,t=>v.amount*(t/maxYears)/v.totalVe*100);
    return {big:fmtNum(vePow,0),bigUnit:' veTkn',bigLabel:'Voting Power',
      subs:[{l:'Porsi Voting',v:fmtNum(votingShare,4)+'%'},{l:'Boost APY Max',v:fmtNum(Math.min(votingShare*5,2.5),2)+'×'}],
      note:{type:'info',text:'ve-Tokenomics "mengunci" modal dan insentif pemegang besar untuk tidak dump — terbukti menstabilkan protokol lewat Curve Wars.'},
      chart:{xMin:0.25,xMax:4,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.15,vline:v.lockYears,series:[{label:'Voting Share (%) vs Durasi Kunci',color:COLORS.violet,pts}]}}
  }
},
{id:'mev',ch:5,year:2021,who:'Flashbots',name:'MEV (Maximal Extractable Value)',
  desc:'Nilai tersembunyi yang diekstraksi miner/validator lewat penyusunan ulang, penyisipan, dan penghapusan transaksi dalam mempool — biaya tak kasat mata ekosistem blockchain.',
  tex:'MEV=\\Pi_{arb}-C_{gas}-C_{bribe}',
  vars:[{k:'arbProfit',label:'Profit Arbitrase Bruto',min:10,max:100000,step:10,def:500,unit:' USDC'},{k:'gasCost',label:'Biaya Gas',min:1,max:1000,step:1,def:30,unit:' USDC'},{k:'bribe',label:'Bribe ke Builder/Validator',min:0,max:90,step:1,def:40,unit:'%'}],
  calc(v){
    const bribeAmt=(v.arbProfit-v.gasCost)*v.bribe/100;
    const netMEV=v.arbProfit-v.gasCost-bribeAmt;
    return {big:fmtNum(netMEV,2),bigUnit:' USDC',bigLabel:'MEV Bersih (Searcher)',
      subs:[{l:'Bribe ke Validator',v:fmtNum(bribeAmt,2)+' USDC'},{l:'Kompetisi Estimasi',v: netMEV>v.gasCost*3?'Layak':'Tipis'}],

{id:'curve-stableswap',ch:5,year:2022,who:'Michael Egorov',name:'Curve StableSwap',
  desc:'Algoritma hibrida yang menggabungkan constant sum (flat, zero slippage saat seimbang) dan constant product (bekerja di extremes) untuk aset pegged.',
  tex:'A\\cdot n^n\\sum x_i + D = A\\cdot n^n\\cdot D + \\frac{D^{n+1}}{n^n\\prod x_i}',
  vars:[{k:'x1',label:'Reserve Token 1 (USDC)',min:100,max:10000,step:100,def:3000,unit:''},{k:'x2',label:'Reserve Token 2 (USDT)',min:100,max:10000,step:100,def:3000,unit:''},{k:'A',label:'Amplification Parameter (A)',min:1,max:1000,step:10,def:200,unit:''},{k:'trade',label:'Jumlah USDC Ditukar',min:1,max:1000,step:1,def:100,unit:''}],
  calc(v){
    const D=v.x1+v.x2;
    const n=2;
    const Ann=v.A*n*n;
    const newX1=v.x1+v.trade;
    function solveY(x1,D,Ann,n){
      const c=D*D*D/(Ann*n*n*x1), b=x1+D/Ann;
      let y=D;
      for(let i=0;i<100;i++){ const yPrev=y; y=(y*y+c)/(2*y+b-D); if(Math.abs(y-yPrev)<1e-6)break; }
      return y;
    }
    const newX2=solveY(newX1,D,Ann,n);
    const out=v.x2-newX2;
    const slip=((v.x2/v.x1)-(v.x2-out)/(v.x1+v.trade))*100;
    const uniOut=v.x1*v.x2/(v.x1+v.trade)-v.x2+v.x2*v.trade/(v.x1+v.trade);
    return {big:fmtNum(out,4),bigUnit:' USDT',bigLabel:'USDT Diterima',
      subs:[{l:'Slippage',v:fmtNum(Math.abs(slip),4)+'%'},{l:'vs AMM biasa (Uniswap v2)',v:fmtNum(out/Math.max(v.x1*v.x2/(v.x1+v.trade),0.001),3)+'× lebih efisien'}],
      note:{type:'good',text:'Curve StableSwap hampir zero slippage saat pool seimbang karena berperilaku seperti constant sum (x+y=D) saat mendekati rasio 1:1.'},
      chart:{mode:'bars',decimals:2,unit:'',bars:[{label:'USDC Reserve',value:newX1,color:COLORS.cyan},{label:'USDT Reserve',value:newX2,color:COLORS.green},{label:'USDT Keluar',value:out,color:COLORS.amber}]}}
  }
},
{id:'twap',ch:5,year:2022,who:'Uniswap Quants',name:'TWAP Oracle',
  desc:'Rata-rata harga tertimbang waktu on-chain — sterilisasi manipulasi Flash Loan dengan meratakan harga dalam window waktu sehingga attack cost meningkat drastis.',
  tex:'TWAP=\\frac{\\text{cumPrice}(t_1)-\\text{cumPrice}(t_0)}{t_1-t_0}',
  vars:[{k:'window',label:'Window TWAP (menit)',min:1,max:60,step:1,def:30,unit:' mnt'},{k:'spotPrice',label:'Harga Spot Saat Ini',min:100,max:100000,step:100,def:3500,unit:''},{k:'manipAttempt',label:'Harga Manipulasi dalam 1 Blok',min:100,max:150000,step:100,def:5000,unit:''}],
  calc(v){
    const blocksPerMin=5;
    const totalBlocks=v.window*blocksPerMin;
    const manipBlocks=2;
    const twap=(v.spotPrice*(totalBlocks-manipBlocks)+v.manipAttempt*manipBlocks)/totalBlocks;
    const deviation=Math.abs(twap-v.spotPrice)/v.spotPrice*100;
    return {big:fmtNum(twap,2),bigUnit:'',bigLabel:'Harga TWAP '+v.window+' menit',
      subs:[{l:'Dampak Manipulasi ke TWAP',v:fmtNum(deviation,4)+'%'},{l:'Harga Spot',v:fmtNum(v.spotPrice,2)}],
      note:{type:'good',text:'Bahkan manipulasi harga ekstrem dalam 1 blok hanya menggeser TWAP sebesar '+fmtNum(deviation,4)+'% — menjadikannya oracle sangat mahal untuk diserang.'},
      chart:{mode:'bars',decimals:2,bars:[{label:'Harga Spot',value:v.spotPrice,color:COLORS.amber},{label:'Harga Manipulasi',value:v.manipAttempt,color:COLORS.red},{label:'Harga TWAP',value:twap,color:COLORS.green}]}}
  }
},
{id:'basis-trade',ch:5,year:2022,who:'Crypto Arbs',name:'Basis Trade & Cash-and-Carry',

      chart:{xMin:-0.1,xMax:0.2,yMin:Math.min(...pts.map(p=>p.y))*1.1-5,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.fundingRate,hlines:[{y:0,color:COLORS.faint,dash:true}],series:[{label:'Net Yield (%) vs Funding Rate',color:COLORS.amber,pts}]}}

{id:'gauge-voting',ch:5,year:2022,who:'DeFi Quants (Curve Wars)',name:'Gauge Voting & Curve Wars',

{id:'bridge',ch:5,year:2022,who:'LayerZero / Wormhole',name:'Cross-Chain Bridge Model',

{id:'clmm-tick',ch:5,year:2023,who:'Uniswap Quants',name:'CLMM Tick Math',
  desc:'Arsitektur pemetaan heksadesimal batas harga dalam smart contract berbiaya gas rendah — setiap tick mewakili perubahan harga 0.01% (1.0001^tick).',
  tex:'P(\\text{tick})=1.0001^{tick},\\quad tick=\\lfloor\\log_{1.0001}(P)\\rfloor',
  vars:[{k:'tick',label:'Tick Number',min:-887272,max:887272,step:100,def:80000,unit:''}],
  calc(v){
    const price=Math.pow(1.0001,v.tick);
    const tickPerDollar=1/Math.log(1.0001)/price;
    const pts=sweep(-887272,887272,80,t=>Math.log10(Math.pow(1.0001,t)));
    return {big:fmtCompact(price),bigUnit:'',bigLabel:'Harga di Tick '+v.tick,
      subs:[{l:'Tick per $1 perubahan',v:fmtCompact(tickPerDollar)},{l:'Perubahan per Tick',v:fmtNum(0.01,2)+'%'}],
      note:{type:'info',text:'Desain tick memungkinkan representasi harga dari sangat kecil (negatif) hingga sangat besar (positif) dengan presisi konstan 0.01% per langkah.'},
      chart:{xMin:-887272,xMax:887272,yMin:Math.min(...pts.map(p=>p.y)),yMax:Math.max(...pts.map(p=>p.y)),vline:v.tick,series:[{label:'log₁₀(Harga) vs Tick',color:COLORS.green,pts}]}}
  }
},

{id:'perp-dex',ch:5,year:2023,who:'GMX, Hyperliquid',name:'Perp DEX Funding (On-chain)',
  desc:'Struktur pembentukan harga perp on-chain — mark price dibentuk dari median oracle feeds dengan mekanisme funding identik BitMEX namun sepenuhnya tanpa matching engine off-chain.',
  tex:'P_{mark}=\\text{median}(P_1,P_2,\\ldots,P_n)',
  vars:[{k:'p1',label:'Oracle Harga 1',min:10000,max:100000,step:10,def:60050,unit:''},{k:'p2',label:'Oracle Harga 2',min:10000,max:100000,step:10,def:60020,unit:''},{k:'p3',label:'Oracle Harga 3',min:10000,max:100000,step:10,def:59980,unit:''},{k:'pPerp',label:'Harga Perp DEX',min:10000,max:100000,step:10,def:60200,unit:''}],

      subs:[{l:'Harga Perp DEX',v:fmtNum(v.pPerp,0)+'$'},{l:'Selisih / Funding Signal',v:fmtNum(fr,4)+'%'}],

{id:'llamma',ch:5,year:2023,who:'Michael Egorov',name:'crvUSD LLAMMA',
  desc:'AMM khusus likuidasi soft iteratif crvUSD — kolateral bergeser perlahan antara "aktif" dan "terlikuidasi" seiring harga bergerak, memitigasi dampak kolaps mendadak.',
  tex:'\\text{Band } i: [P_{low}^i, P_{high}^i],\\quad\\text{LP dinamis}',

{id:'eigenlayer',ch:5,year:2023,who:'Sreeram Kannan',name:'Restaking & EigenLayer AVS',

  tex:'Yield_{total}=Yield_{ETH}+\\sum_i Yield_{AVS_i}-\\text{Slashing Risk}',
  vars:[{k:'ethYield',label:'ETH Staking Base Yield',min:2,max:8,step:0.1,def:4,unit:'%'},{k:'avs1',label:'AVS 1 Yield',min:0,max:15,step:0.5,def:5,unit:'%'},{k:'avs2',label:'AVS 2 Yield',min:0,max:15,step:0.5,def:3,unit:'%'},{k:'slashProb',label:'Probabilitas Slashing Gabungan',min:0,max:10,step:0.1,def:1,unit:'%'},{k:'slashSize',label:'Ukuran Slashing',min:0,max:50,step:1,def:10,unit:'%'}],

      subs:[{l:'Gross Yield',v:fmtNum(gross,2)+'%'},{l:'Expected Slashing Cost',v:fmtNum(slashCost,2)+'%/th'}],
      note:{type: slashCost>gross*0.3?'warn':'good',text: slashCost>gross*0.3?'Risiko slashing signifikan — pilih AVS dengan rekam jejak keamanan terpercaya sebelum meng-opt-in.':'Restaking menarik: expected slashing cost jauh di bawah yield tambahan dari AVS.'},
      chart:{mode:'bars',decimals:2,unit:'%',bars:[{label:'ETH Base Yield',value:v.ethYield,color:COLORS.cyan},{label:'AVS 1',value:v.avs1,color:COLORS.green},{label:'AVS 2',value:v.avs2,color:COLORS.violet},{label:'Slashing Risk',value:-slashCost,color:COLORS.red},{label:'Net Yield',value:net,color:COLORS.amber}]}}
