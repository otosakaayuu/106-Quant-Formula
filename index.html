<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Quant Codex · 106 Rumus Quant Finance Interaktif</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<style>
:root{
  --bg:#0b1220;
  --bg2:#0e1626;
  --panel:#101a30;
  --panel2:#0d1626;
  --border:#23304a;
  --border-soft:#1a2440;
  --text:#e8ecf4;
  --dim:#8a93a8;
  --faint:#5b6478;
  --amber:#ffb020;
  --amber-soft:rgba(255,176,32,.12);
  --cyan:#5ec8d8;
  --cyan-soft:rgba(94,200,216,.12);
  --green:#34d399;
  --red:#ef5d5d;
  --violet:#a78bfa;
  --mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  --sans:'Inter',-apple-system,'Segoe UI',Roboto,sans-serif;
  --radius:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);}
body{overflow:hidden;}
::selection{background:var(--amber-soft);color:var(--amber);}
#app{display:flex;flex-direction:column;height:100vh;}

/* ---- topbar ---- */
#topbar{display:flex;align-items:center;gap:16px;padding:10px 16px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,var(--bg2),var(--bg));flex-shrink:0;}
.brand{font-family:var(--mono);font-weight:700;font-size:15px;letter-spacing:.5px;color:var(--text);white-space:nowrap;display:flex;align-items:baseline;gap:2px;}
.brand .dot{color:var(--amber);}
.brand span.sub{color:var(--amber);font-weight:700;}
#hamburger{display:none;background:none;border:1px solid var(--border);color:var(--text);border-radius:8px;width:34px;height:34px;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:16px;}
.searchwrap{flex:1;max-width:420px;position:relative;}
.searchwrap input{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:8px 12px 8px 30px;border-radius:8px;font-family:var(--sans);font-size:13px;outline:none;transition:border-color .15s;}
.searchwrap input:focus{border-color:var(--amber);}
.searchwrap::before{content:"⌕";position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:14px;pointer-events:none;}
.stat{font-family:var(--mono);font-size:11px;color:var(--dim);white-space:nowrap;margin-left:auto;letter-spacing:.3px;}
.stat b{color:var(--amber);}

/* ---- ticker ---- */
#ticker{height:30px;border-bottom:1px solid var(--border-soft);background:var(--panel2);overflow:hidden;position:relative;flex-shrink:0;}
#ticker::before,#ticker::after{content:"";position:absolute;top:0;bottom:0;width:40px;z-index:2;pointer-events:none;}
#ticker::before{left:0;background:linear-gradient(90deg,var(--panel2),transparent);}
#ticker::after{right:0;background:linear-gradient(-90deg,var(--panel2),transparent);}
#tickerTrack{display:flex;align-items:center;height:100%;white-space:nowrap;width:max-content;animation:tickerScroll 90s linear infinite;}
#ticker:hover #tickerTrack{animation-play-state:paused;}
@keyframes tickerScroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.tick-item{font-family:var(--mono);font-size:11px;color:var(--faint);padding:0 18px;cursor:pointer;border-right:1px solid var(--border-soft);transition:color .15s;}
.tick-item:hover{color:var(--amber);}
.tick-item b{color:var(--dim);font-weight:600;}
.tick-item:hover b{color:var(--amber);}

/* ---- body layout ---- */
#body{flex:1;display:flex;overflow:hidden;min-height:0;position:relative;}
#sidebar{width:300px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;background:var(--bg2);}
#sidebar::-webkit-scrollbar{width:6px;}
#sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.chapter-group{border-bottom:1px solid var(--border-soft);}
.chapter-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;user-select:none;}
.chapter-head:hover{background:var(--panel);}
.chapter-head .ch-title{font-size:12px;font-weight:700;color:var(--text);letter-spacing:.3px;}
.chapter-head .ch-sub{font-size:10.5px;color:var(--faint);margin-top:2px;}
.chapter-head .ch-count{font-family:var(--mono);font-size:10.5px;color:var(--amber);background:var(--amber-soft);padding:2px 7px;border-radius:20px;flex-shrink:0;margin-left:8px;}
.chapter-head .chev{color:var(--faint);font-size:11px;margin-left:8px;transition:transform .15s;flex-shrink:0;}
.chapter-group.collapsed .chev{transform:rotate(-90deg);}
.chapter-body{overflow:hidden;}
.chapter-group.collapsed .chapter-body{display:none;}
.formula-row{display:flex;align-items:baseline;gap:8px;padding:7px 14px 7px 20px;cursor:pointer;border-left:2px solid transparent;transition:background .12s,border-color .12s;}
.formula-row:hover{background:var(--panel);}
.formula-row.active{background:var(--panel);border-left-color:var(--amber);}
.formula-row .yr{font-family:var(--mono);font-size:10.5px;color:var(--faint);flex-shrink:0;width:34px;}
.formula-row.active .yr{color:var(--amber);}
.formula-row .nm{font-size:12px;color:var(--dim);line-height:1.3;}
.formula-row.active .nm{color:var(--text);}
.formula-row.hidden{display:none;}

#main{flex:1;overflow-y:auto;padding:26px 32px 60px;min-width:0;}
#main::-webkit-scrollbar{width:8px;}
#main::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

.f-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
.pill{font-family:var(--mono);font-size:10.5px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);color:var(--dim);}
.pill.ch{color:var(--amber);border-color:var(--amber-soft);background:var(--amber-soft);}
.f-title{font-size:24px;font-weight:700;letter-spacing:-.2px;margin:0 0 4px;}
.f-who{font-family:var(--mono);font-size:12px;color:var(--faint);margin-bottom:16px;}
.f-desc{font-size:13.5px;color:var(--dim);line-height:1.65;max-width:780px;margin-bottom:18px;}

.f-formula-box{background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius);padding:20px 18px;margin-bottom:20px;overflow-x:auto;}
.f-formula-box .katex{font-size:1.05em;color:var(--text);}
.f-formula-box .katex .mord,.f-formula-box .katex .mbin,.f-formula-box .katex .mrel{color:var(--text);}

.f-grid{display:grid;grid-template-columns:1.15fr 1fr;gap:18px;margin-bottom:18px;align-items:start;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
.card h4{margin:0 0 12px;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:600;}

.ctrl{margin-bottom:14px;}
.ctrl:last-child{margin-bottom:0;}
.ctrl-label{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:6px;}
.ctrl-label .val{font-family:var(--mono);color:var(--amber);font-weight:600;}
input[type=range]{width:100%;height:4px;border-radius:2px;background:var(--border);outline:none;-webkit-appearance:none;accent-color:var(--amber);}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--amber);cursor:pointer;box-shadow:0 0 0 3px rgba(255,176,32,.18);}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--amber);border:none;cursor:pointer;box-shadow:0 0 0 3px rgba(255,176,32,.18);}
.toggle-wrap{display:flex;background:var(--panel2);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.toggle-wrap button{flex:1;background:none;border:none;color:var(--dim);font-size:12px;padding:7px;cursor:pointer;font-family:var(--sans);transition:.15s;}
.toggle-wrap button.on{background:var(--amber-soft);color:var(--amber);font-weight:600;}

.readout-big{margin-bottom:14px;}
.readout-big .lbl{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.readout-big .num{font-family:var(--mono);font-size:34px;font-weight:700;color:var(--amber);text-shadow:0 0 18px rgba(255,176,32,.35);line-height:1.1;letter-spacing:-.5px;}
.readout-big .num small{font-size:16px;font-weight:600;margin-left:3px;color:var(--amber);opacity:.8;}
.sub-stats{display:flex;flex-direction:column;gap:7px;margin-top:14px;border-top:1px solid var(--border-soft);padding-top:12px;}
.sub-stat{display:flex;justify-content:space-between;font-size:12px;}
.sub-stat .l{color:var(--faint);}
.sub-stat .v{font-family:var(--mono);color:var(--text);font-weight:600;}
.note-badge{margin-top:14px;font-size:11.5px;padding:9px 12px;border-radius:8px;line-height:1.5;}
.note-badge.info{background:var(--cyan-soft);color:var(--cyan);}
.note-badge.warn{background:rgba(255,176,32,.12);color:var(--amber);}
.note-badge.danger{background:rgba(239,93,93,.12);color:var(--red);}
.note-badge.good{background:rgba(52,211,153,.12);color:var(--green);}

.f-chartwrap{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px 10px;}
.chart-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px;}
.chart-head h4{margin:0;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:600;}
#chartCanvas{display:block;width:100%;}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid var(--border-soft);}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--dim);font-family:var(--mono);}
.legend-sw{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.legend-sw.dash{background:none;border-top:2px dashed var(--dim);height:0;width:14px;}
.randbtn{background:var(--panel2);border:1px solid var(--border);color:var(--amber);font-family:var(--mono);font-size:11px;padding:6px 12px;border-radius:7px;cursor:pointer;transition:.15s;white-space:nowrap;}
.randbtn:hover{background:var(--amber-soft);border-color:var(--amber);}
.randbtn:active{transform:scale(.96);}

.intro-card{background:linear-gradient(135deg,var(--panel),var(--panel2));border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:20px;font-size:12.5px;color:var(--dim);line-height:1.6;}
.intro-card b{color:var(--amber);}

@media (max-width:880px){
  #hamburger{display:flex;}
  .stat{display:none;}
  #sidebar{position:absolute;left:0;top:0;bottom:0;z-index:10;transform:translateX(-100%);transition:transform .2s;box-shadow:8px 0 24px rgba(0,0,0,.4);}
  #sidebar.open{transform:translateX(0);}
  #body.sb-open::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:5;}
  #main{padding:18px 16px 50px;}
  .f-grid{grid-template-columns:1fr;}
  .f-title{font-size:20px;}
  .readout-big .num{font-size:28px;}
}
</style>

<div id="app">

<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script>
/* =========================================================
   QUANT CODEX — engine inti
   ========================================================= */

/* ---------- math helpers ---------- */
function clampNum(v,a,b){return Math.max(a,Math.min(b,v));}
function lerp(a,b,t){return a+(b-a)*t;}
function easeInOutCubic(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}

function erf(x){
  const s=x<0?-1:1; x=Math.abs(x);
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const t=1/(1+p*x);
  const y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return s*y;
}
function ncdf(x){return 0.5*(1+erf(x/Math.SQRT2));}
function npdf(x){return Math.exp(-x*x/2)/Math.sqrt(2*Math.PI);}
function invNcdf(p){
  if(p<=0)return -8; if(p>=1)return 8;
  const a=[-3.969683028665376e+01,2.209460984245205e+02,-2.759285104469687e+02,1.383577518672690e+02,-3.066479806614716e+01,2.506628277459239e+00];
  const b=[-5.447609879822406e+01,1.615858368580409e+02,-1.556989798598866e+02,6.680131188771972e+01,-1.328068155288572e+01];
  const c=[-7.784894002430293e-03,-3.223964580411365e-01,-2.400758277161838e+00,-2.549732539343734e+00,4.374664141464968e+00,2.938163982698783e+00];
  const d=[7.784695709041462e-03,3.224671290700398e-01,2.445134137142996e+00,3.754408661907416e+00];
  const plow=0.02425, phigh=1-plow; let q,r;
  if(p<plow){q=Math.sqrt(-2*Math.log(p));return (((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);}
  if(p<=phigh){q=p-0.5;r=q*q;return (((((a[0]*r+a[1])*r+a[2])*r+a[3])*r+a[4])*r+a[5])*q/(((((b[0]*r+b[1])*r+b[2])*r+b[3])*r+b[4])*r+1);}
  q=Math.sqrt(-2*Math.log(1-p));
  return -(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);
}
function bsPrice(S,K,r,sigma,T,isCall){
  if(isCall===undefined)isCall=true;
  if(T<=0||sigma<=0)return Math.max(isCall?S-K:K-S,0);
  const d1=(Math.log(S/K)+(r+sigma*sigma/2)*T)/(sigma*Math.sqrt(T));
  const d2=d1-sigma*Math.sqrt(T);
  return isCall? S*ncdf(d1)-K*Math.exp(-r*T)*ncdf(d2) : K*Math.exp(-r*T)*ncdf(-d2)-S*ncdf(-d1);
}
function bsGreeks(S,K,r,sigma,T){
  const sqrtT=Math.sqrt(Math.max(T,1e-6));
  const d1=(Math.log(S/K)+(r+sigma*sigma/2)*T)/(sigma*sqrtT);
  const d2=d1-sigma*sqrtT;
  return {
    delta:ncdf(d1),
    gamma:npdf(d1)/(S*sigma*sqrtT),
    vega:S*npdf(d1)*sqrtT/100,
    theta:(-S*npdf(d1)*sigma/(2*sqrtT)-r*K*Math.exp(-r*T)*ncdf(d2))/365,
    rho:K*T*Math.exp(-r*T)*ncdf(d2)/100,
    call:S*ncdf(d1)-K*Math.exp(-r*T)*ncdf(d2)
  };
}
function crrBinomial(S,K,r,sigma,T,n,isCall){
  if(isCall===undefined)isCall=true;
  n=isFinite(n)?Math.max(2,Math.round(n)):15;
  const dt=T/n,u=Math.exp(sigma*Math.sqrt(dt)),d=1/u;
  const p=clampNum((Math.exp(r*dt)-d)/(u-d),0.001,0.999);
  let pr=new Array(n+1);
  for(let i=0;i<=n;i++){const ST=S*Math.pow(u,n-i)*Math.pow(d,i); pr[i]=isCall?Math.max(ST-K,0):Math.max(K-ST,0);}
  const disc=Math.exp(-r*dt);
  for(let step=n-1;step>=0;step--){for(let i=0;i<=step;i++){pr[i]=disc*(p*pr[i]+(1-p)*pr[i+1]);}}
  return pr[0];
}
function bivNormCdf(x,y,rho){
  const n=60,xlo=-8,ylo=-8;
  const dx=(x-xlo)/n,dy=(y-ylo)/n;
  const denom=2*Math.PI*Math.sqrt(Math.max(1-rho*rho,1e-6));
  let sum=0;
  for(let i=0;i<n;i++){
    const xi=xlo+dx*(i+0.5);
    for(let j=0;j<n;j++){
      const yj=ylo+dy*(j+0.5);
      const q=(xi*xi-2*rho*xi*yj+yj*yj)/(2*Math.max(1-rho*rho,1e-6));
      sum+=Math.exp(-q)/denom*dx*dy;
    }
  }
  return clampNum(sum,0,1);
}
function mulberry32(seed){
  let t=seed>>>0;
  return function(){
    t+=0x6D2B79F5; let r=t;
    r=Math.imul(r^(r>>>15),r|1);
    r^=r+Math.imul(r^(r>>>7),r|61);
    return ((r^(r>>>14))>>>0)/4294967296;
  };
}
function gaussRNG(rng){let u=0,v=0;while(u===0)u=rng();while(v===0)v=rng();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function sweep(xmin,xmax,n,fn){const pts=[];for(let i=0;i<=n;i++){const x=xmin+(xmax-xmin)*i/n;pts.push({x,y:fn(x)});}return pts;}

/* ---------- formatting ---------- */
function fmtNum(v,dec){
  if(v===undefined||v===null||isNaN(v))return '–';
  dec=dec===undefined?2:dec;
  const neg=v<0; v=Math.abs(v);
  let s=v.toFixed(dec);
  let [int,frac]=s.split('.');
  int=int.replace(/\B(?=(\d{3})+(?!\d))/g,',');
  return (neg?'-':'')+int+(frac?'.'+frac:'');
}
function fmtAxis(v){
  const av=Math.abs(v);
  if(av>=1e9)return (v/1e9).toFixed(1)+'B';
  if(av>=1e6)return (v/1e6).toFixed(1)+'M';
  if(av>=1e3)return (v/1e3).toFixed(1)+'k';
  if(av>=1)return v.toFixed(av>=100?0:1);
  if(av===0)return '0';
  return v.toFixed(3);
}
function fmtCompact(v){
  if(v===undefined||v===null||isNaN(v))return '–';
  const neg=v<0; v=Math.abs(v);
  let s;
  if(v>=1e12)s=(v/1e12).toFixed(2)+'T';
  else if(v>=1e9)s=(v/1e9).toFixed(2)+'B';
  else if(v>=1e6)s=(v/1e6).toFixed(2)+'M';
  else if(v>=1e3)s=(v/1e3).toFixed(2)+'K';
  else s=fmtNum(v,2);
  return (neg?'-':'')+s;
}

/* ---------- colors ---------- */
const COLORS={bg:'#0b1220',panel:'#101a30',border:'#23304a',borderSoft:'#1a2440',text:'#e8ecf4',dim:'#8a93a8',faint:'#5b6478',
  amber:'#ffb020',cyan:'#5ec8d8',green:'#34d399',red:'#ef5d5d',violet:'#a78bfa'};

/* ---------- canvas drawing primitives ---------- */
function roundRectPath(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function interpY(pts,x){
  if(!pts||!pts.length)return null;
  if(x<=pts[0].x)return pts[0].y;
  if(x>=pts[pts.length-1].x)return pts[pts.length-1].y;
  for(let i=0;i<pts.length-1;i++){
    if(x>=pts[i].x&&x<=pts[i+1].x){
      const t=(x-pts[i].x)/((pts[i+1].x-pts[i].x)||1);
      return lerp(pts[i].y,pts[i+1].y,t);
    }
  }
  return pts[pts.length-1].y;
}
const MONOFONT="11px ui-monospace, 'IBM Plex Mono', Menlo, Consolas, monospace";

function drawLine(ctx,w,h,spec){
  const m={l:48,r:18,t:16,b:30};
  const pw=Math.max(10,w-m.l-m.r), ph=Math.max(10,h-m.t-m.b);
  const xMin=spec.xMin,xMax=spec.xMax,yMin=spec.yMin,yMax=spec.yMax;
  const sx=x=>m.l+(x-xMin)/((xMax-xMin)||1)*pw;
  const sy=y=>m.t+(1-(y-yMin)/((yMax-yMin)||1))*ph;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle=COLORS.borderSoft; ctx.lineWidth=1; ctx.font=MONOFONT; ctx.fillStyle=COLORS.faint;
  for(let i=0;i<=4;i++){
    const yv=yMin+(yMax-yMin)*i/4, yy=sy(yv);
    ctx.beginPath();ctx.moveTo(m.l,yy);ctx.lineTo(w-m.r,yy);ctx.stroke();
    ctx.fillText(fmtAxis(yv),3,yy+3);
  }
  for(let i=0;i<=5;i++){
    const xv=xMin+(xMax-xMin)*i/5, xx=sx(xv);
    ctx.fillText(fmtAxis(xv),Math.min(Math.max(xx-12,m.l),w-m.r-22),h-m.b+16);
  }
  (spec.hlines||[]).forEach(hl=>{
    ctx.save();
    ctx.strokeStyle=hl.color||COLORS.dim; ctx.setLineDash(hl.dash===false?[]:[4,4]); ctx.lineWidth=1.2;
    const yy=sy(clampNum(hl.y,yMin,yMax));
    ctx.beginPath();ctx.moveTo(m.l,yy);ctx.lineTo(w-m.r,yy);ctx.stroke();
    ctx.restore();
  });
  (spec.series||[]).forEach(s=>{
    if(s.fillRange){
      const pts=s.pts.filter(p=>p.x>=s.fillRange[0]&&p.x<=s.fillRange[1]);
      if(pts.length>1){
        ctx.save();ctx.beginPath();
        ctx.moveTo(sx(pts[0].x),sy(yMin));
        pts.forEach(p=>ctx.lineTo(sx(p.x),sy(clampNum(p.y,yMin,yMax))));
        ctx.lineTo(sx(pts[pts.length-1].x),sy(yMin));
        ctx.closePath(); ctx.fillStyle=(s.color||COLORS.cyan)+'33'; ctx.fill(); ctx.restore();
      }
    }
    if(s.fill){
      ctx.save();ctx.beginPath();
      ctx.moveTo(sx(s.pts[0].x),sy(yMin));
      s.pts.forEach(p=>ctx.lineTo(sx(p.x),sy(clampNum(p.y,yMin,yMax))));
      ctx.lineTo(sx(s.pts[s.pts.length-1].x),sy(yMin));
      ctx.closePath(); ctx.fillStyle=(s.color||COLORS.cyan)+'1f'; ctx.fill(); ctx.restore();
    }
  });
  (spec.series||[]).forEach(s=>{
    ctx.save();
    ctx.strokeStyle=s.color||COLORS.cyan; ctx.lineWidth=2.2; ctx.lineJoin='round';
    if(s.dash)ctx.setLineDash([6,4]); else ctx.setLineDash([]);
    ctx.beginPath();
    s.pts.forEach((p,i)=>{const X=sx(p.x),Y=sy(clampNum(p.y,yMin,yMax));if(i===0)ctx.moveTo(X,Y);else ctx.lineTo(X,Y);});
    ctx.stroke(); ctx.restore();
  });
  if(spec.vline!=null){
    const xx=sx(clampNum(spec.vline,xMin,xMax));
    ctx.save();ctx.strokeStyle=COLORS.amber;ctx.setLineDash([3,3]);ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(xx,m.t);ctx.lineTo(xx,h-m.b);ctx.stroke();ctx.restore();
    const s0=(spec.series||[])[0];
    if(s0){
      const yv=interpY(s0.pts,clampNum(spec.vline,xMin,xMax));
      if(yv!=null){
        const Y=sy(clampNum(yv,yMin,yMax));
        ctx.save();ctx.fillStyle=COLORS.amber;ctx.shadowColor=COLORS.amber;ctx.shadowBlur=9;
        ctx.beginPath();ctx.arc(xx,Y,4.5,0,Math.PI*2);ctx.fill();ctx.restore();
      }
    }
  }
  ctx.strokeStyle=COLORS.border;ctx.lineWidth=1;ctx.strokeRect(m.l,m.t,pw,ph);
}
function drawGauge(ctx,w,h,spec){
  ctx.clearRect(0,0,w,h);
  const barY=h/2-4, barH=20;
  const x0=20,x1=w-20;
  const sx=v=>x0+(clampNum(v,spec.min,spec.max)-spec.min)/((spec.max-spec.min)||1)*(x1-x0);
  (spec.zones||[]).forEach(z=>{
    const xa=sx(z.from),xb=sx(z.to);
    ctx.fillStyle=z.color; roundRectPath(ctx,xa,barY,Math.max(1,xb-xa),barH,4); ctx.fill();
  });
  ctx.strokeStyle=COLORS.border;ctx.lineWidth=1;roundRectPath(ctx,x0,barY,x1-x0,barH,6);ctx.stroke();
  ctx.font=MONOFONT;ctx.fillStyle=COLORS.dim;ctx.textAlign='center';
  (spec.zones||[]).forEach(z=>{
    const xc=(sx(z.from)+sx(z.to))/2;
    ctx.fillText(z.label,clampNum(xc,x0+30,x1-30),barY+barH+18);
  });
  const xv=sx(spec.value);
  ctx.save();ctx.strokeStyle=COLORS.text;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(xv,barY-8);ctx.lineTo(xv,barY+barH+8);ctx.stroke();
  ctx.fillStyle=COLORS.amber;ctx.shadowColor=COLORS.amber;ctx.shadowBlur=10;
  ctx.beginPath();ctx.moveTo(xv,barY-8);ctx.lineTo(xv-6,barY-18);ctx.lineTo(xv+6,barY-18);ctx.closePath();ctx.fill();
  ctx.restore();
  ctx.textAlign='center';ctx.font="bold 13px ui-monospace, 'IBM Plex Mono', Menlo, Consolas, monospace";ctx.fillStyle=COLORS.text;
  ctx.fillText(fmtNum(spec.value,spec.decimals===undefined?2:spec.decimals)+(spec.unit||''),clampNum(xv,x0+30,x1-30),barY-26);
  ctx.textAlign='left';
}
function drawBars(ctx,w,h,spec){
  ctx.clearRect(0,0,w,h);
  const m={l:48,r:18,t:24,b:34};
  const pw=Math.max(10,w-m.l-m.r), ph=Math.max(10,h-m.t-m.b);
  const vals=spec.bars.map(b=>b.value);
  let yMin=Math.min(0,...vals), yMax=Math.max(0,...vals);
  if(yMin===yMax)yMax=yMin+1;
  const pad=(yMax-yMin)*0.18||1; yMin-=pad; yMax+=pad;
  const sy=v=>m.t+(1-(v-yMin)/((yMax-yMin)||1))*ph;
  const zeroY=sy(0);
  ctx.strokeStyle=COLORS.borderSoft;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(m.l,zeroY);ctx.lineTo(w-m.r,zeroY);ctx.stroke();
  const n=spec.bars.length, gap=pw/n, bw=Math.min(gap*0.55,70);
  ctx.font=MONOFONT;ctx.textAlign='center';
  spec.bars.forEach((b,i)=>{
    const xc=m.l+gap*i+gap/2;
    const y0=zeroY,y1=sy(b.value);
    const top=Math.min(y0,y1), hgt=Math.max(2,Math.abs(y1-y0));
    ctx.fillStyle=b.color||COLORS.cyan;
    roundRectPath(ctx,xc-bw/2,top,bw,hgt,3);ctx.fill();
    ctx.fillStyle=COLORS.text;
    ctx.fillText(fmtNum(b.value,spec.decimals===undefined?1:spec.decimals)+(spec.unit||''),xc,(b.value>=0?top-7:top+hgt+15));
    ctx.fillStyle=COLORS.dim;
    ctx.fillText(b.label,xc,h-m.b+16);
  });
  ctx.strokeStyle=COLORS.border;ctx.strokeRect(m.l,m.t,pw,ph);
}

function lerpSpec(from,to,e){
  if(!from||from.mode!==to.mode)from=null;
  if(to.mode==='gauge'){
    const fv=from?from.value:to.min;
    return Object.assign({},to,{value:lerp(fv,to.value,e)});
  }
  if(to.mode==='bars'){
    return Object.assign({},to,{bars:to.bars.map((b,i)=>{
      const fv=(from&&from.bars&&from.bars[i])?from.bars[i].value:0;
      return Object.assign({},b,{value:lerp(fv,b.value,e)});
    })});
  }
  return Object.assign({},to,{
    vline: to.vline==null?to.vline:lerp((from&&from.vline!=null)?from.vline:to.vline,to.vline,e),
    series: to.series.map((s,si)=>Object.assign({},s,{pts:s.pts.map((p,pi)=>{
      const fp=(from&&from.series&&from.series[si]&&from.series[si].pts[pi])?from.series[si].pts[pi]:null;
      return {x:p.x,y: fp? lerp(fp.y,p.y,e) : lerp(to.yMin,p.y,e)};
    })})),
    hlines: (to.hlines||[]).map((hl,i)=>{
      const fh=(from&&from.hlines&&from.hlines[i])?from.hlines[i]:null;
      return Object.assign({},hl,{y: fh? lerp(fh.y,hl.y,e): hl.y});
    })
  });
}

class QChart{
  constructor(canvas){
    this.canvas=canvas; this.ctx=canvas.getContext('2d');
    this.cur=null; this.raf=null;
    this._resize();
    this._ro=new ResizeObserver(()=>this._resize());
    this._ro.observe(canvas.parentElement);
  }
  _resize(){
    const dpr=window.devicePixelRatio||1;
    const rect=this.canvas.parentElement.getBoundingClientRect();
    const hpx= window.innerWidth<=880?220:264;
    this.w=Math.max(260,rect.width-2); this.h=hpx;
    this.canvas.width=this.w*dpr; this.canvas.height=this.h*dpr;
    this.canvas.style.width=this.w+'px'; this.canvas.style.height=this.h+'px';
    this.ctx.setTransform(dpr,0,0,dpr,0,0);
    if(this.cur)this._draw(this.cur);
  }
  destroy(){ if(this._ro)this._ro.disconnect(); cancelAnimationFrame(this.raf); }
  _draw(spec){
    if(spec.mode==='gauge')drawGauge(this.ctx,this.w,this.h,spec);
    else if(spec.mode==='bars')drawBars(this.ctx,this.w,this.h,spec);
    else drawLine(this.ctx,this.w,this.h,spec);
  }
  set(spec){
    cancelAnimationFrame(this.raf);
    const from=this.cur, to=spec;
    const start=performance.now(); const dur= from?380:680;
    const step=(now)=>{
      const k=Math.min(1,(now-start)/dur); const e=easeInOutCubic(k);
      this._draw(lerpSpec(from,to,e));
      if(k<1){this.raf=requestAnimationFrame(step);} else {this.cur=to;}
    };
    this.raf=requestAnimationFrame(step);
  }
}

  desc:'Model opsi pertama dalam sejarah yang menggunakan gerak Brown (Brownian motion) untuk memodelkan harga aset secara acak — fondasi matematis seluruh quant finance modern.',
  tex:'C=(S-K)\\Phi(d)+\\sigma\\sqrt{T}\\,\\varphi(d),\\quad d=\\frac{S-K}{\\sigma\\sqrt{T}}',

    {k:'K',label:'Harga Strike (K)',min:50,max:200,step:1,def:100,unit:''},
    {k:'r',label:'Suku Bunga (r)',min:0,max:10,step:0.25,def:3,unit:'%'},
    {k:'sigma',label:'Volatilitas (σ)',min:5,max:100,step:1,def:25,unit:'%'},
    {k:'T',label:'Waktu Jatuh Tempo (T)',min:0.05,max:2,step:0.05,def:0.5,unit:' th'}
  ],
  calc(v){
    function price(F){
      const sig=v.sigma/100; const d1=(Math.log(F/v.K)+sig*sig*v.T/2)/(sig*Math.sqrt(v.T));
      const d2=d1-sig*Math.sqrt(v.T);
      return Math.exp(-v.r/100*v.T)*(F*ncdf(d1)-v.K*ncdf(d2));
    }
    const call=price(v.F);
    const pts=sweep(50,200,60,price);
    return {
      big:fmtNum(call,2),bigUnit:'',bigLabel:'Harga Call Futures',
      subs:[{l:'Faktor Diskonto e^-rT',v:fmtNum(Math.exp(-v.r/100*v.T),4)}],
      note:{type:'info',text:'Karena posisi futures bersifat self-financing, drift risk-neutral menjadi nol — hanya faktor diskonto yang membedakannya dari Black-Scholes.'},
      chart:{xMin:50,xMax:200,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.15,vline:v.F,series:[{label:'Harga Call vs Futures',color:COLORS.amber,pts}]}
    };
  }
},
{
  id:'merton-jd',ch:1,year:1976,who:'Robert Merton',name:'Merton Jump-Diffusion',
  desc:'Memperluas Black-Scholes dengan menambahkan elemen lonjakan harga mendadak (jump) di atas gerak Brown kontinu — menangkap risiko crash.',
  tex:'C=\\sum_{n=0}^{\\infty} e^{-\\lambda T}\\frac{(\\lambda T)^n}{n!}\\,C_{BS}(\\sigma_n,r_n)',
  vars:[
    {k:'S0',label:'Harga Awal (S₀)',min:50,max:200,step:1,def:100,unit:''},
    {k:'K',label:'Harga Strike (K)',min:50,max:200,step:1,def:100,unit:''},
    {k:'sigma',label:'Volatilitas Difusi (σ)',min:5,max:60,step:1,def:20,unit:'%'},
    {k:'lambda',label:'Intensitas Lompatan (λ per th)',min:0,max:5,step:0.1,def:1,unit:''},
    {k:'delta',label:'Volatilitas Ukuran Lompatan (δ)',min:0,max:50,step:1,def:15,unit:'%'},
    {k:'T',label:'Waktu Jatuh Tempo (T)',min:0.1,max:2,step:0.05,def:1,unit:' th'}
  ],
  stochastic:true,
  calc(v,rng){
    function factorial(n){let f=1;for(let i=2;i<=n;i++)f*=i;return f;}
    const rf=0.03,lam=v.lambda,sig=v.sigma/100,delt=v.delta/100;
    const k=Math.exp(0.5*delt*delt)-1;
    let price=0;
    for(let n=0;n<=12;n++){
      const sigN=Math.sqrt(sig*sig+n*delt*delt/v.T);
      const rN=rf-lam*k+n*Math.log(1+k)/v.T;
      const w=Math.exp(-lam*v.T)*Math.pow(lam*v.T,n)/factorial(n);
      price+=w*bsPrice(v.S0,v.K,rN,sigN,v.T,true);
    }
    const steps=80; const dt=v.T/steps; const pts=[]; let S=v.S0;
    for(let i=0;i<=steps;i++){
      pts.push({x:i*dt,y:S});
      const z=gaussRNG(rng);
      S=S*Math.exp((rf-0.5*sig*sig)*dt+sig*Math.sqrt(dt)*z);
      if(rng()<lam*dt){ const jz=gaussRNG(rng); S=S*Math.exp(delt*jz-0.5*delt*delt); }
      S=Math.max(S,1);
    }
    const ys=pts.map(p=>p.y);
    return {
      big:fmtNum(price,2),bigUnit:'',bigLabel:'Harga Opsi Call',
      subs:[{l:'Kompensasi Drift (λk)',v:fmtNum(lam*k*100,2)+'%'}],
      note:{type:'warn',text:'Lintasan simulasi menunjukkan lompatan mendadak (jump) di atas pergerakan difusi normal — klik "Acak Ulang" untuk skenario baru.'},
      chart:{xMin:0,xMax:v.T,yMin:Math.min(...ys)*0.9,yMax:Math.max(...ys)*1.1,series:[{label:'Lintasan Harga Tersimulasi',color:COLORS.violet,pts}]}
    };
  }
},
{
  id:'vasicek',ch:1,year:1977,who:'Oldřich Vašíček',name:'Vasicek Model',
  desc:'Model suku bunga jangka pendek pertama dengan sifat mean-reverting — suku bunga ditarik kembali ke rata-rata jangka panjang.',
  tex:'dr=a(b-r)\\,dt+\\sigma\\,dW',
  vars:[
    {k:'a',label:'Kecepatan Reversi (a)',min:0.05,max:2,step:0.05,def:0.3,unit:''},
    {k:'b',label:'Rata-rata Jangka Panjang (b)',min:0,max:10,step:0.1,def:4,unit:'%'},
    {k:'sigma',label:'Volatilitas (σ)',min:0.1,max:5,step:0.1,def:1,unit:'%'},
    {k:'r0',label:'Suku Bunga Awal (r₀)',min:0,max:10,step:0.1,def:3,unit:'%'},
    {k:'T',label:'Jatuh Tempo Obligasi (T)',min:0.5,max:30,step:0.5,def:5,unit:' th'}
  ],
  stochastic:true,
  calc(v,rng){
    const a=v.a,b=v.b/100,sig=v.sigma/100,r0=v.r0/100,T=v.T;
    const Bt=(1-Math.exp(-a*T))/a;
    const At=Math.exp((Bt-T)*(b-sig*sig/(2*a*a))-sig*sig*Bt*Bt/(4*a));
    const bondPrice=At*Math.exp(-Bt*r0)*100;
    const steps=100,dt=T/steps; const pts=[]; let r=r0;
    for(let i=0;i<=steps;i++){ pts.push({x:i*dt,y:r*100}); const z=gaussRNG(rng); r=r+a*(b-r)*dt+sig*Math.sqrt(dt)*z; }
    const ys=pts.map(p=>p.y);
    return {
      big:fmtNum(bondPrice,2),bigUnit:'',bigLabel:'Harga Zero-Coupon Bond',
      subs:[{l:'Half-life Reversi',v:fmtNum(Math.log(2)/a,2)+' th'}],
      note:{type:'info',text:'Kelemahan model: suku bunga secara teoritis bisa menjadi negatif (terlihat bila lintasan menukik di bawah 0%).'},
      chart:{xMin:0,xMax:T,yMin:Math.min(...ys,0)-1,yMax:Math.max(...ys)+1,hlines:[{y:b*100,color:COLORS.faint,dash:true}],series:[{label:'Lintasan Suku Bunga Simulasi',color:COLORS.cyan,pts}]}
    };
  }
},
{
  id:'crr',ch:1,year:1979,who:'Cox, Ross, Rubinstein',name:'CRR Binomial Model',
  desc:'Pendekatan diskrit (pohon binomial) untuk mem-pricing opsi secara numerik — konvergen ke Black-Scholes saat jumlah langkah bertambah.',
  tex:'u=e^{\\sigma\\sqrt{\\Delta t}},\\ d=1/u,\\ p=\\frac{e^{r\\Delta t}-d}{u-d}',
  vars:[
    {k:'S',label:'Harga Saham (S)',min:50,max:200,step:1,def:100,unit:''},
    {k:'K',label:'Harga Strike (K)',min:50,max:200,step:1,def:100,unit:''},
    {k:'r',label:'Suku Bunga (r)',min:0,max:10,step:0.25,def:5,unit:'%'},
    {k:'sigma',label:'Volatilitas (σ)',min:5,max:100,step:1,def:20,unit:'%'},
    {k:'T',label:'Jatuh Tempo (T)',min:0.1,max:2,step:0.05,def:1,unit:' th'},
    {k:'steps',label:'Jumlah Langkah Pohon (n)',min:2,max:100,step:1,def:15,unit:''}
  ],
  calc(v){
    const price=crrBinomial(v.S,v.K,v.r/100,v.sigma/100,v.T,v.steps,true);
    const bs=bsPrice(v.S,v.K,v.r/100,v.sigma/100,v.T,true);
    const ptsB=sweep(50,200,40,S=>crrBinomial(S,v.K,v.r/100,v.sigma/100,v.T,v.steps,true));
    const ptsBS=sweep(50,200,40,S=>bsPrice(S,v.K,v.r/100,v.sigma/100,v.T,true));
    return {
      big:fmtNum(price,3),bigUnit:'',bigLabel:'Harga Call (Binomial)',
      subs:[{l:'Harga Black-Scholes',v:fmtNum(bs,3)},{l:'Selisih',v:fmtNum(price-bs,4)}],
      note:{type: Math.abs(price-bs)<0.05?'good':'info', text: Math.abs(price-bs)<0.05? 'Pada n besar, harga binomial konvergen sangat dekat dengan Black-Scholes kontinu.':'Tambah jumlah langkah pohon untuk melihat konvergensi ke harga Black-Scholes.'},
      chart:{xMin:50,xMax:200,yMin:0,yMax:Math.max(...ptsB.map(p=>p.y),...ptsBS.map(p=>p.y))*1.15,vline:v.S,series:[
        {label:'Binomial',color:COLORS.amber,pts:ptsB},
        {label:'Black-Scholes (limit)',color:COLORS.cyan,pts:ptsBS,dash:true}
      ]}
    };
  }
},
{
  id:'garman-kohlhagen',ch:1,year:1983,who:'Garman, Kohlhagen',name:'Garman-Kohlhagen Model',
  desc:'Modifikasi Black-Scholes khusus untuk mem-pricing opsi valuta asing, memperhitungkan dua suku bunga (domestik & asing).',
  tex:'C=Se^{-r_fT}\\Phi(d_1)-Ke^{-r_dT}\\Phi(d_2)',
  vars:[
    {k:'S',label:'Spot FX (S)',min:0.5,max:2,step:0.01,def:1,unit:''},
    {k:'K',label:'Strike FX (K)',min:0.5,max:2,step:0.01,def:1,unit:''},
    {k:'rd',label:'Suku Bunga Domestik (r_d)',min:0,max:10,step:0.25,def:5,unit:'%'},
    {k:'rf',label:'Suku Bunga Asing (r_f)',min:0,max:10,step:0.25,def:2,unit:'%'},
    {k:'sigma',label:'Volatilitas FX (σ)',min:3,max:40,step:1,def:12,unit:'%'},
    {k:'T',label:'Jatuh Tempo (T)',min:0.05,max:2,step:0.05,def:0.5,unit:' th'}
  ],
  calc(v){
    function price(S){
      const sig=v.sigma/100,rd=v.rd/100,rf=v.rf/100;
      const d1=(Math.log(S/v.K)+(rd-rf+sig*sig/2)*v.T)/(sig*Math.sqrt(v.T));
      const d2=d1-sig*Math.sqrt(v.T);
      return S*Math.exp(-rf*v.T)*ncdf(d1)-v.K*Math.exp(-rd*v.T)*ncdf(d2);
    }
    const call=price(v.S);
    const pts=sweep(0.5,2,60,price);
    return {
      big:fmtNum(call,4),bigUnit:'',bigLabel:'Harga Call FX',
      subs:[{l:'Forward Implisit',v:fmtNum(v.S*Math.exp((v.rd-v.rf)/100*v.T),4)}],
      note:{type:'info',text:'Selisih suku bunga domestik-asing berperan seperti dividend yield dalam Black-Scholes klasik.'},
      chart:{xMin:0.5,xMax:2,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.15,vline:v.S,series:[{label:'Harga Call vs Spot FX',color:COLORS.amber,pts}]}
    };
  }
},
{
  id:'cir',ch:1,year:1985,who:'Cox, Ingersoll, Ross',name:'CIR Model',
  desc:'Model suku bunga yang secara matematis mencegah rates menjadi negatif, menggunakan akar suku bunga dalam term difusi.',
  tex:'dr=a(b-r)\\,dt+\\sigma\\sqrt{r}\\,dW',
  vars:[
    {k:'a',label:'Kecepatan Reversi (a)',min:0.05,max:2,step:0.05,def:0.4,unit:''},
    {k:'b',label:'Rata-rata Jangka Panjang (b)',min:0,max:10,step:0.1,def:4,unit:'%'},
    {k:'sigma',label:'Volatilitas (σ)',min:0.1,max:5,step:0.1,def:1.5,unit:'%'},
    {k:'r0',label:'Suku Bunga Awal (r₀)',min:0.1,max:10,step:0.1,def:3,unit:'%'},
    {k:'T',label:'Horizon (T)',min:0.5,max:10,step:0.5,def:3,unit:' th'}
  ],
  stochastic:true,
  calc(v,rng){
    const a=v.a,b=v.b/100,sig=v.sigma/100,r0=v.r0/100,T=v.T;
    const feller=2*a*b/(sig*sig);
    const steps=100,dt=T/steps; const pts=[]; let r=r0,sum=0;
    for(let i=0;i<=steps;i++){
      pts.push({x:i*dt,y:Math.max(r,0)*100}); sum+=Math.max(r,0);
      const z=gaussRNG(rng);
      r=r+a*(b-r)*dt+sig*Math.sqrt(Math.max(r,0)*dt)*z;
      r=Math.max(r,0);
    }
    const avgR=sum/(steps+1)*100;
    return {
      big:fmtNum(r*100,2),bigUnit:'%',bigLabel:'Suku Bunga Akhir Simulasi r(T)',
      subs:[{l:'Rata-rata Lintasan',v:fmtNum(avgR,2)+'%'},{l:'Kondisi Feller (2ab/σ²)',v:fmtNum(feller,2)+(feller>1?' (>1, aman)':' (<1, berisiko)')}],
      note:{type: feller>1?'good':'warn', text: feller>1? 'Kondisi Feller terpenuhi: suku bunga dijamin tidak pernah negatif maupun menyentuh nol.':'Kondisi Feller tidak terpenuhi: lintasan berisiko menyentuh nol.'},
      chart:{xMin:0,xMax:T,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.2+1,hlines:[{y:b*100,color:COLORS.faint,dash:true}],series:[{label:'Lintasan Suku Bunga CIR',color:COLORS.green,pts}]}
    };
  }
},
{
  id:'holee',ch:1,year:1987,who:'Thomas Ho, Sang Bin Lee',name:'Ho-Lee Model',
  desc:'Model term-structure suku bunga pertama yang dikalibrasi agar konsisten dengan kurva yield pasar saat ini, tanpa mean-reversion.',
  tex:'dr=\\theta(t)\\,dt+\\sigma\\,dW',
  vars:[
    {k:'r0',label:'Suku Bunga Awal (r₀)',min:0,max:10,step:0.1,def:3,unit:'%'},
    {k:'mu',label:'Drift Konstan (θ)',min:-2,max:2,step:0.05,def:0.3,unit:'%/th'},
    {k:'sigma',label:'Volatilitas (σ)',min:0.1,max:3,step:0.05,def:1,unit:'%'},
    {k:'T',label:'Horizon (T)',min:0.5,max:10,step:0.5,def:5,unit:' th'}
  ],
  stochastic:true,
  calc(v,rng){
    const r0=v.r0/100,mu=v.mu/100,sig=v.sigma/100,T=v.T;
    const steps=100,dt=T/steps; const pts=[]; let r=r0;
    for(let i=0;i<=steps;i++){ pts.push({x:i*dt,y:r*100}); const z=gaussRNG(rng); r=r+mu*dt+sig*Math.sqrt(dt)*z; }
    return {
      big:fmtNum(r*100,2),bigUnit:'%',bigLabel:'Suku Bunga Akhir r(T)',
      subs:[{l:'Drift Kumulatif',v:fmtNum(mu*T*100,2)+'%'}],
      note:{type:'info',text:'Tanpa mean-reversion, varian suku bunga terus bertambah seiring waktu — model ini cocok jangka pendek namun kurang realistis jangka panjang.'},
      chart:{xMin:0,xMax:T,yMin:Math.min(...pts.map(p=>p.y),0)-1,yMax:Math.max(...pts.map(p=>p.y))+1,series:[{label:'Lintasan Suku Bunga Ho-Lee',color:COLORS.violet,pts}]}
    };
  }
},
{
  id:'apt',ch:1,year:1987,who:'Stephen Ross',name:'Arbitrage Pricing Theory',
  desc:'Valuasi aset multifaktor yang tidak bergantung pada portofolio pasar tunggal seperti CAPM — return dijelaskan oleh beberapa faktor makro independen.',
  tex:'E(R_i)=R_f+\\beta_1F_1+\\beta_2F_2+\\beta_3F_3',
  vars:[
    {k:'rf',label:'Risk-Free Rate',min:0,max:10,step:0.25,def:4,unit:'%'},
    {k:'b1',label:'Eksposur Faktor Growth (β₁)',min:-2,max:2,step:0.1,def:0.8,unit:''},
    {k:'b2',label:'Eksposur Faktor Inflasi (β₂)',min:-2,max:2,step:0.1,def:-0.4,unit:''},
    {k:'b3',label:'Eksposur Faktor Kredit (β₃)',min:-2,max:2,step:0.1,def:0.5,unit:''}
  ],
  calc(v){
    const f1=3,f2=-1.5,f3=2;
    const c1=v.b1*f1,c2=v.b2*f2,c3=v.b3*f3;
    const er=v.rf+c1+c2+c3;
    return {
      big:fmtNum(er,2),bigUnit:'%',bigLabel:'Expected Return Total',
      subs:[{l:'Premi Faktor Growth',v:f1+'%'},{l:'Premi Faktor Inflasi',v:f2+'%'},{l:'Premi Faktor Kredit',v:f3+'%'}],
      note:{type:'info',text:'Premi tiap faktor (Growth, Inflasi, Kredit) bersifat tetap pada model edukatif ini; eksposur (β) yang menentukan kontribusi akhir.'},
      chart:{mode:'bars',decimals:2,bars:[
        {label:'Rf',value:v.rf,color:COLORS.faint},
        {label:'Growth',value:c1,color:COLORS.amber},
        {label:'Inflasi',value:c2,color:COLORS.red},
        {label:'Kredit',value:c3,color:COLORS.cyan},
        {label:'Total',value:er,color:COLORS.green}
      ]}
    };
  }
},
{
  id:'hullwhite',ch:1,year:1990,who:'Hull, White',name:'Hull-White Model',
  desc:'Penyempurnaan Vasicek yang dikalibrasi tanpa-arbitrase terhadap kurva term-structure suku bunga pasar saat ini, dengan target mean yang berubah seiring waktu.',
  tex:'dr=[\\theta(t)-ar]\\,dt+\\sigma\\,dW',
  vars:[
    {k:'a',label:'Kecepatan Reversi (a)',min:0.05,max:2,step:0.05,def:0.25,unit:''},
    {k:'sigma',label:'Volatilitas (σ)',min:0.1,max:3,step:0.05,def:1,unit:'%'},
    {k:'b0',label:'Target Awal (b₀)',min:0,max:8,step:0.1,def:3,unit:'%'},
    {k:'b1',label:'Target Akhir (b₁)',min:0,max:8,step:0.1,def:5,unit:'%'},
    {k:'r0',label:'Suku Bunga Awal (r₀)',min:0,max:10,step:0.1,def:3,unit:'%'},
    {k:'T',label:'Horizon (T)',min:0.5,max:10,step:0.5,def:5,unit:' th'}
  ],
  stochastic:true,
  calc(v,rng){
    const a=v.a,sig=v.sigma/100,r0=v.r0/100,T=v.T;
    const steps=100,dt=T/steps; const pts=[],target=[]; let r=r0;
    for(let i=0;i<=steps;i++){
      const t=i*dt; const bt=(v.b0+(v.b1-v.b0)*t/T)/100;
      pts.push({x:t,y:r*100}); target.push({x:t,y:bt*100});
      const z=gaussRNG(rng);
      r=r+a*(bt-r)*dt+sig*Math.sqrt(dt)*z;
    }
    return {
      big:fmtNum(r*100,2),bigUnit:'%',bigLabel:'Suku Bunga Akhir r(T)',
      subs:[{l:'Target Akhir b(T)',v:fmtNum(v.b1,2)+'%'}],
      note:{type:'info',text:'Garis putus-putus menunjukkan target kurva b(t) yang bergerak naik/turun seiring waktu — Hull-White menarik r(t) ke target dinamis ini.'},
      chart:{xMin:0,xMax:T,yMin:Math.min(...pts.map(p=>p.y),...target.map(p=>p.y))-1,yMax:Math.max(...pts.map(p=>p.y),...target.map(p=>p.y))+1,series:[
        {label:'Lintasan r(t)',color:COLORS.amber,pts},
        {label:'Target b(t)',color:COLORS.faint,pts:target,dash:true}
      ]}
    };
  }
},
{
  id:'hjm',ch:1,year:1992,who:'Heath, Jarrow, Morton',name:'HJM Framework',
  desc:'Kerangka komprehensif yang memodelkan evolusi seluruh kurva forward rate sekaligus, bukan hanya satu titik suku bunga pendek.',
  tex:'df(t,T)=\\alpha(t,T)\\,dt+\\sigma(t,T)\\,dW',
  vars:[
    {k:'baseRate',label:'Suku Bunga Dasar',min:0,max:8,step:0.1,def:4,unit:'%'},
    {k:'slope',label:'Kemiringan Kurva',min:0,max:3,step:0.1,def:1,unit:''},
    {k:'sigma0',label:'Volatilitas Forward (σ₀)',min:0.1,max:3,step:0.1,def:1,unit:'%'},
    {k:'kappa',label:'Peluruhan Volatilitas (κ)',min:0,max:1,step:0.05,def:0.3,unit:''},
    {k:'shock',label:'Kejutan Pasar (z-score)',min:-3,max:3,step:0.1,def:0,unit:''}
  ],
  calc(v){
    function f0(T){ return v.baseRate+v.slope*Math.sqrt(T); }
    function f1(T){ return f0(T)+v.sigma0*Math.exp(-v.kappa*T)*v.shock; }
    const pts0=sweep(0.25,30,60,f0), pts1=sweep(0.25,30,60,f1);
    const shiftAt5=f1(5)-f0(5);
    return {
      big:fmtNum(f1(5),3),bigUnit:'%',bigLabel:'Forward Rate f(0,5th) Setelah Kejutan',
      subs:[{l:'Forward Rate Awal f(0,5th)',v:fmtNum(f0(5),3)+'%'},{l:'Pergeseran',v:fmtNum(shiftAt5,3)+'%'}],
      note:{type:'info',text:'Volatilitas kejutan meluruh secara eksponensial untuk maturitas yang lebih jauh — tenor pendek lebih terpengaruh kejutan pasar instan.'},
      chart:{xMin:0.25,xMax:30,yMin:Math.min(...pts0.map(p=>p.y),...pts1.map(p=>p.y))-0.5,yMax:Math.max(...pts0.map(p=>p.y),...pts1.map(p=>p.y))+0.5,vline:5,series:[
        {label:'Kurva Forward Awal',color:COLORS.faint,pts:pts0,dash:true},
        {label:'Kurva Forward Setelah Kejutan',color:COLORS.amber,pts:pts1}
      ]}
    };
  }
},
{
  id:'lmm',ch:1,year:1997,who:'Brace, Gatarek, Musiela',name:'LIBOR Market Model (BGM)',
  desc:'Model industri standar yang memperlakukan setiap forward rate sebagai proses lognormal — basis penentuan harga derivatif suku bunga kompleks (caps, swaptions).',
  tex:'dL_i=\\mu_iL_i\\,dt+\\sigma_iL_i\\,dW_i',
  vars:[
    {k:'L0',label:'Forward Rate Awal (L₀)',min:0,max:10,step:0.1,def:4,unit:'%'},
    {k:'mu',label:'Drift (μ)',min:-2,max:2,step:0.05,def:0,unit:'%'},
    {k:'sigma',label:'Volatilitas Lognormal (σ)',min:5,max:60,step:1,def:25,unit:'%'},

      big:fmtNum(L*100,2),bigUnit:'%',bigLabel:'Forward Rate Akhir L(T)',
      subs:[{l:'Forward Rate Awal',v:fmtNum(v.L0,2)+'%'}],
      note:{type:'info',text:'Karena lognormal, forward rate dijamin tetap positif — keunggulan dibanding model Gaussian seperti Vasicek/Ho-Lee.'},

{

{

  desc:'Mengasumsikan volatilitas itu sendiri bergerak secara stokastik (mean-reverting), bukan konstan seperti pada Black-Scholes — menangkap volatility clustering & smile.',
  tex:'dv=\\kappa(\\theta-v)\\,dt+\\xi\\sqrt{v}\\,dZ',
  vars:[
    {k:'kappa',label:'Kecepatan Reversi Varians (κ)',min:0.1,max:5,step:0.1,def:2,unit:''},
    {k:'thetaVol',label:'Volatilitas Jangka Panjang',min:10,max:60,step:1,def:25,unit:'%'},
    {k:'xi',label:'Volatilitas-dari-Volatilitas (ξ)',min:0.1,max:1,step:0.05,def:0.3,unit:''},
    {k:'v0Vol',label:'Volatilitas Awal',min:5,max:80,step:1,def:20,unit:'%'},
    {k:'T',label:'Horizon (T)',min:0.25,max:3,step:0.25,def:1,unit:' th'}
  ],
  stochastic:true,
  calc(v,rng){
    const kappa=v.kappa,theta=Math.pow(v.thetaVol/100,2),xi=v.xi,v0=Math.pow(v.v0Vol/100,2),T=v.T;

{
  id:'var',ch:2,year:1994,who:'JPMorgan (RiskMetrics)',name:'Value at Risk (VaR)',
  desc:'Mengestimasi kerugian maksimum portofolio pada tingkat keyakinan dan horizon waktu tertentu — standar manajemen risiko institusional sejak RiskMetrics.',

{

{
  id:'sabr',ch:2,year:1995,who:'Hagan et al.',name:'SABR Model',
  desc:'Memodelkan volatilitas silang (stochastic alpha, beta, rho) untuk derivatif suku bunga — pendekatan Hagan menjadi standar pasar kalibrasi smile.',
  tex:'\\sigma_{impl}(K)\\approx\\frac{\\alpha}{F^{1-\\beta}}\\Big[1+\\big(\\cdots\\big)T\\Big]',
  vars:[
    {k:'F',label:'Forward Rate (F)',min:1,max:10,step:0.1,def:3,unit:'%'},
    {k:'alpha',label:'Level Volatilitas (α)',min:0.05,max:0.6,step:0.01,def:0.2,unit:''},
    {k:'beta',label:'Eksponen Skewness (β)',min:0,max:1,step:0.05,def:0.5,unit:''},
    {k:'rho',label:'Korelasi (ρ)',min:-0.99,max:0.99,step:0.01,def:-0.3,unit:''},
    {k:'nu',label:'Vol-of-Vol (ν)',min:0.1,max:1,step:0.05,def:0.4,unit:''},
    {k:'T',label:'Maturitas (T)',min:0.25,max:5,step:0.25,def:1,unit:' th'}
  ],
  calc(v){
    function sabrVol(Kpct){
      const F=v.F/100,K=Kpct/100,b=v.beta,a=v.alpha,rho=v.rho,nu=v.nu,T=v.T;
      const Fmid=Math.sqrt(F*K);
      const term1=a/Math.pow(Fmid,1-b);
      const corr=1+((Math.pow(1-b,2)*a*a/(24*Math.pow(Fmid,2-2*b)))+(rho*b*nu*a/(4*Math.pow(Fmid,1-b)))+((2-3*rho*rho)*nu*nu/24))*T;
      return term1*corr*100;
    }
    const atmVol=sabrVol(v.F);
    const pts=sweep(v.F*0.3,v.F*2,60,sabrVol);
    return {
      big:fmtNum(atmVol,2),bigUnit:'%',bigLabel:'Implied Vol ATM',
      subs:[{l:'Forward Rate',v:fmtNum(v.F,2)+'%'}],
      note:{type:'info',text:'Parameter ρ mengontrol kemiringan (skew) smile, sedangkan ν mengontrol kelengkungan (kurvatur) — keduanya hasil kalibrasi pasar harian.'},
      chart:{xMin:v.F*0.3,xMax:v.F*2,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.15,vline:v.F,series:[{label:'Smile Implied Vol σ(K) %',color:COLORS.amber,pts}]}
    };
  }
},
{
  id:'es-cvar',ch:2,year:1997,who:'Artzner et al.',name:'Expected Shortfall (CVaR)',
  desc:'Mengukur rata-rata kerugian pada ekor distribusi yang lebih tebal dari VaR — risk measure yang coherent dan lebih sensitif terhadap risiko ekstrem.',
  tex:'ES_\\alpha=\\frac{\\sigma\\,\\varphi(z_\\alpha)}{1-\\alpha}\\cdot V',
  vars:[
    {k:'value',label:'Nilai Portofolio',min:10,max:1000,step:10,def:100,unit:' M'},
    {k:'vol',label:'Volatilitas Harian (σ)',min:0.5,max:10,step:0.1,def:2,unit:'%'},

      chart:{xMin:-4*sig,xMax:4*sig,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.15,vline:-VaR/v.value*100,series:[{label:'Distribusi Return (%)',color:COLORS.cyan,pts,fillRange:[-4*sig,-VaR/v.value*100]}]}
    };

},
{
  id:'gaussian-copula',ch:2,year:1999,who:'David X. Li',name:'Gaussian Copula Model',
  desc:'Formula korelasi default lintas-aset yang memungkinkan pricing CDO secara masif — kesalahan kalibrasinya turut memicu kolaps subprime 2008.',
  tex:'P(D_1\\cap D_2)=\\Phi_2\\big(\\Phi^{-1}(p_1),\\Phi^{-1}(p_2),\\rho\\big)',
  vars:[
    {k:'p1',label:'Probabilitas Default Aset 1',min:0.5,max:20,step:0.5,def:5,unit:'%'},
    {k:'p2',label:'Probabilitas Default Aset 2',min:0.5,max:20,step:0.5,def:5,unit:'%'},
    {k:'rho',label:'Korelasi Default (ρ)',min:0,max:0.95,step:0.01,def:0.3,unit:''}

  calc(v){
    const z1=invNcdf(v.p1/100), z2=invNcdf(v.p2/100);
    function jointAt(rho){ return bivNormCdf(z1,z2,rho)*100; }
    const joint=jointAt(v.rho);
    const indep=v.p1/100*v.p2/100*100;
    const pts=sweep(0,0.95,40,jointAt);
    return {
      big:fmtNum(joint,3),bigUnit:'%',bigLabel:'Probabilitas Default Bersama',
      subs:[{l:'Jika Independen',v:fmtNum(indep,3)+'%'},{l:'Rasio terhadap Independensi',v:fmtNum(joint/indep,2)+'×'}],
      note:{type: v.rho>0.5?'warn':'info', text: v.rho>0.5? 'Korelasi tinggi membuat risiko default "menggumpal" — inilah yang membuat tranche senior CDO jauh lebih berisiko dari perkiraan model saat krisis 2008.':'Pada korelasi rendah, probabilitas default bersama mendekati skenario independen.'},

    };

{
  id:'variance-gamma',ch:2,year:2000,who:'Madan, Carr, Chang',name:'Variance Gamma Model',
  desc:'Proses Lévy murni-lompatan (pure jump) tanpa komponen difusi kontinu — menangkap ekor distribusi tebal (fat tails) aset secara lebih realistis.',
  tex:'X(t)=\\theta\\,G(t)+\\sigma\\sqrt{G(t)}\\,Z,\\quad G(t)\\sim\\text{Gamma}(t/\\nu,\\nu)',
  vars:[
    {k:'theta',label:'Drift Asimetri (θ)',min:-0.3,max:0.3,step:0.01,def:-0.1,unit:''},
    {k:'sigma',label:'Volatilitas (σ)',min:0.05,max:0.6,step:0.01,def:0.2,unit:''},
    {k:'nu',label:'Variance Rate Waktu-Gamma (ν)',min:0.05,max:1,step:0.01,def:0.3,unit:''},
    {k:'T',label:'Horizon (T)',min:0.1,max:2,step:0.05,def:1,unit:' th'}
  ],
  stochastic:true,
  calc(v,rng){
    function gammaSample(shape,scale){
      if(shape<1){ const u=Math.max(rng(),1e-9); return gammaSample(shape+1,scale)*Math.pow(u,1/shape); }
      const d=shape-1/3, c=1/Math.sqrt(9*d);
      for(let it=0;it<50;it++){
        let x,v3; do{ x=gaussRNG(rng); v3=1+c*x; }while(v3<=0);
        v3=v3*v3*v3; const u=rng();
        if(Math.log(u)<0.5*x*x+d-d*v3+d*Math.log(v3)) return d*v3*scale;
      }
      return d*scale;
    }
    const steps=70,dt=v.T/steps; const pts=[]; let X=0;
    for(let i=0;i<=steps;i++){
      pts.push({x:i*dt,y:X});
      const dG=gammaSample(Math.max(dt/v.nu,0.02),v.nu);
      const z=gaussRNG(rng);
      X+=v.theta*dG+v.sigma*Math.sqrt(Math.max(dG,0))*z;
    }
    const ys=pts.map(p=>p.y);
    return {
      big:fmtNum(X*100,2),bigUnit:'%',bigLabel:'Return Kumulatif Tersimulasi',
      subs:[{l:'Excess Kurtosis Teoritis',v:fmtNum(3*v.nu+3*v.theta*v.theta*v.nu/(v.sigma*v.sigma),2)}],
      note:{type:'info',text:'Berbeda dari gerak Brown yang mulus, lintasan VG murni-lompatan menunjukkan perubahan tersentak-sentak — sumber "fat tails" pada return aset riil.'},
      chart:{xMin:0,xMax:v.T,yMin:Math.min(...ys)-0.05,yMax:Math.max(...ys)+0.05,series:[{label:'Lintasan Proses Variance Gamma',color:COLORS.violet,pts}]}
    };
  }
},
{
  id:'garch',ch:2,year:2002,who:'Engle, Bollerslev',name:'GARCH(1,1) Model',
  desc:'Algoritma pemodelan varians yang berubah-ubah seiring waktu (time-varying volatility) — menangkap volatility clustering: gejolak besar memicu gejolak besar berikutnya.',
  tex:'\\sigma_t^2=\\omega+\\alpha\\,\\varepsilon_{t-1}^2+\\beta\\,\\sigma_{t-1}^2',
  vars:[
    {k:'longRunVol',label:'Volatilitas Jangka Panjang',min:5,max:40,step:1,def:20,unit:'%'},
    {k:'alpha',label:'Reaksi Kejutan (α)',min:0.01,max:0.3,step:0.01,def:0.08,unit:''},
    {k:'beta',label:'Persistensi (β)',min:0.5,max:0.98,step:0.01,def:0.9,unit:''},
    {k:'shockToday',label:'Kejutan Pasar Hari Ini (z-score)',min:-5,max:5,step:0.1,def:2,unit:''}
  ],
  calc(v){
    const longVar=Math.pow(v.longRunVol/100,2);
    const omega=longVar*(1-v.alpha-v.beta);
    const eps0=v.shockToday*Math.sqrt(longVar);
    let varT=omega+v.alpha*eps0*eps0+v.beta*longVar;
    const days=60; const pts=[{x:0,y:v.longRunVol}];
    for(let d=1;d<=days;d++){
      pts.push({x:d,y:Math.sqrt(Math.max(varT,0))*100});
      varT=omega+v.beta*varT;
    }
    const vol1=pts[1].y;
    return {
      big:fmtNum(vol1,2),bigUnit:'%',bigLabel:'Volatilitas Kondisional Hari Ini',
      subs:[{l:'Volatilitas Jangka Panjang',v:fmtNum(v.longRunVol,2)+'%'},{l:'Persistensi Total (α+β)',v:fmtNum((v.alpha+v.beta)*100,1)+'%'}],
      note:{type: Math.abs(v.shockToday)>2?'warn':'info', text: Math.abs(v.shockToday)>2? 'Kejutan besar hari ini memicu lonjakan volatilitas yang meluruh perlahan kembali ke level jangka panjang — pola "volatility clustering" klasik.':'Tanpa kejutan besar, volatilitas berosilasi mendekati level jangka panjangnya.'},
      chart:{xMin:0,xMax:days,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.2+1,hlines:[{y:v.longRunVol,color:COLORS.faint,dash:true}],series:[{label:'Volatilitas Kondisional σₜ (%)',color:COLORS.red,pts}]}
    };
  }
},
{
  id:'local-vol',ch:2,year:2008,who:'Bruno Dupire',name:'Local Volatility Model',
  desc:'Menghitung volatilitas sebagai fungsi deterministik dari harga aset dan waktu — diturunkan langsung dari permukaan implied volatility pasar.',
  tex:'\\sigma_{loc}^2(K,T)=\\frac{\\partial_T C+rK\\partial_K C}{\\tfrac12K^2\\partial_{KK}C}',
  vars:[
    {k:'S',label:'Harga Spot (S)',min:50,max:200,step:1,def:100,unit:''},
    {k:'atmVol',label:'Volatilitas ATM',min:10,max:60,step:1,def:25,unit:'%'},
    {k:'skew',label:'Skew Smile',min:-0.5,max:0.5,step:0.01,def:-0.2,unit:''},
    {k:'T',label:'Maturitas (T)',min:0.1,max:2,step:0.1,def:1,unit:' th'}
  ],
  calc(v){
    function impliedVol(K){ return v.atmVol+v.skew*(K/v.S-1)*100; }
    function localVol(K){
      const h=v.S*0.01;
      const cKp=impliedVol(K+h), cKm=impliedVol(K-h);
      const slope=(cKp-cKm)/(2*h);
      return Math.max(impliedVol(K)+slope*(K-v.S)*0.5,3);
    }
    const ptsImp=sweep(v.S*0.5,v.S*1.5,60,impliedVol);
    const ptsLoc=sweep(v.S*0.5,v.S*1.5,60,localVol);
    return {
      big:fmtNum(localVol(v.S),2),bigUnit:'%',bigLabel:'Local Vol di Spot',
      subs:[{l:'Implied Vol di Spot',v:fmtNum(impliedVol(v.S),2)+'%'}],
      note:{type:'info',text:'Local volatility cenderung "melebih-lebihkan" kemiringan skew dibanding implied volatility — fenomena ini dikenal sebagai aturan 2x skew Dupire.'},
      chart:{xMin:v.S*0.5,xMax:v.S*1.5,yMin:0,yMax:Math.max(...ptsImp.map(p=>p.y),...ptsLoc.map(p=>p.y))*1.15,vline:v.S,series:[
        {label:'Implied Vol σ_impl(K)',color:COLORS.cyan,pts:ptsImp,dash:true},
        {label:'Local Vol σ_loc(K)',color:COLORS.amber,pts:ptsLoc}
      ]}
    };
  }
},
{
  id:'xva',ch:2,year:2010,who:'Post-2008 Quants',name:'xVA Framework',
  desc:'Kumpulan penyesuaian harga derivatif OTC untuk mengakomodasi risiko counterparty (CVA), biaya pendanaan (FVA), dan biaya modal regulasi (KVA).',

{
  id:'rough-vol',ch:2,year:2014,who:'Gatheral et al.',name:'Rough Volatility',
  desc:'Menggunakan proses fraksional (Hurst<0.5) untuk memodelkan volatilitas berfrekuensi tinggi — lintasan lebih "kasar"/jagged dibanding gerak Brown standar.',
  tex:'\\log v(t)=\\eta\\,W_t^H-\\tfrac12\\eta^2t^{2H},\\quad H<0.5',
  vars:[
    {k:'H',label:'Eksponen Hurst (H)',min:0.05,max:0.5,step:0.01,def:0.1,unit:''},
    {k:'eta',label:'Skala Vol-of-Vol (η)',min:0.5,max:3,step:0.1,def:1.5,unit:''},
    {k:'v0',label:'Volatilitas Awal',min:10,max:50,step:1,def:20,unit:'%'}
  ],
  stochastic:true,
  calc(v,rng){
    const steps=120,T=1,dt=T/steps;
    const z=[]; for(let i=0;i<steps+40;i++)z.push(gaussRNG(rng));
    const ys=[];
    for(let i=0;i<=steps;i++){
      let acc=0;
      for(let k2=0;k2<=i+39;k2++){
        const lag=i+40-k2; if(lag<=0)continue;
        acc+=Math.pow(lag,v.H-1.5)*z[k2];
      }
      const fbm=acc*Math.sqrt(dt);
      const tt=Math.max(i*dt,0.001);
      const logv=Math.log(v.v0/100)+v.eta*fbm-0.5*v.eta*v.eta*Math.pow(tt,2*v.H);
      ys.push(Math.exp(logv)*100);
    }
    let totalVariation=0; for(let i=1;i<ys.length;i++) totalVariation+=Math.abs(ys[i]-ys[i-1]);
    const pts=ys.map((y,i)=>({x:i*dt,y}));
    return {
      big:fmtNum(totalVariation,1),bigUnit:'',bigLabel:'Total Variasi Lintasan (Kekasaran)',
      subs:[{l:'Volatilitas Akhir',v:fmtNum(ys[ys.length-1],2)+'%'}],
      note:{type:'info',text:'Semakin kecil H, lintasan semakin "kasar"/jagged (total variasi makin tinggi) — riset Gatheral menemukan H pasar riil sangat rendah, sekitar 0.1.'},
      chart:{xMin:0,xMax:T,yMin:0,yMax:Math.max(...ys)*1.2+2,series:[{label:'Lintasan Volatilitas Kasar v(t)',color:COLORS.violet,pts}]}
    };
  }
},
{

{

{
  id:'mpt',ch:3,year:1952,who:'Harry Markowitz',name:'Modern Portfolio Theory',
  desc:'Titik efisiensi maksimal antara imbal hasil dan varians — dasar Efficient Frontier: setiap portofolio di bawah kurva ini "suboptimal".',
  tex:'\\sigma_p^2=w_1^2\\sigma_1^2+w_2^2\\sigma_2^2+2w_1w_2\\rho\\sigma_1\\sigma_2',
  vars:[
    {k:'r1',label:'Expected Return Aset 1',min:0,max:20,step:0.5,def:8,unit:'%'},
    {k:'r2',label:'Expected Return Aset 2',min:0,max:20,step:0.5,def:12,unit:'%'},
    {k:'s1',label:'Volatilitas Aset 1',min:1,max:40,step:0.5,def:10,unit:'%'},
    {k:'s2',label:'Volatilitas Aset 2',min:1,max:40,step:0.5,def:20,unit:'%'},
    {k:'rho',label:'Korelasi ρ',min:-0.99,max:0.99,step:0.01,def:0.2,unit:''},
    {k:'w1',label:'Bobot Aset 1 (w₁)',min:0,max:100,step:1,def:50,unit:'%'}
  ],
  calc(v){
    const w1=v.w1/100, w2=1-w1;
    const rp=w1*v.r1+w2*v.r2;
    const sp=Math.sqrt(w1*w1*v.s1*v.s1+w2*w2*v.s2*v.s2+2*w1*w2*v.rho*v.s1*v.s2);
    const pts=[];
    for(let ww=0;ww<=100;ww+=2){
      const wa=ww/100, wb=1-wa;
      const x=Math.sqrt(wa*wa*v.s1*v.s1+wb*wb*v.s2*v.s2+2*wa*wb*v.rho*v.s1*v.s2);
      const y=wa*v.r1+wb*v.r2; pts.push({x,y});
    }
    const allX=pts.map(p=>p.x), allY=pts.map(p=>p.y);
    return {
      big:fmtNum(sp,2),bigUnit:'%',bigLabel:'Volatilitas Portofolio σₚ',
      subs:[{l:'Expected Return Portofolio',v:fmtNum(rp,2)+'%'},{l:'Sharpe Ratio (Rf=3%)',v:fmtNum((rp-3)/sp,3)}],
      note:{type:'info',text:'Titik merah pada grafik menunjukkan bobot yang dipilih (w₁='+v.w1+'%). Diversifikasi menurunkan risiko di bawah rata-rata tertimbang volatilitas dua aset.'},

    };
  }

{

{
  id:'deep-hedging',ch:3,year:2018,who:'Hans Bühler',name:'Deep Hedging / Neural SDE',
  desc:'Menggunakan reinforcement learning (RL) untuk melindungi nilai derivatif secara otonom — mempertimbangkan biaya transaksi dan friksi pasar yang diabaikan model klasik.',

  vars:[

    return {

      subs:[{l:'Biaya Transaksi Total/th',v:fmtNum(totalCostPerYear,2)+'%'},{l:'Risiko Residual',v:fmtNum(residualRisk,1)+' rb'}],
      note:{type: hedgeEff>0.9?'good':hedgeEff>0.7?'info':'warn', text: hedgeEff>0.9? 'Efisiensi tinggi — RL agent berhasil menyeimbangkan biaya rebalancing vs perlindungan risiko.':'Biaya transaksi terlalu tinggi atau frekuensi rebalancing terlalu sering — mengurangi efisiensi bersih.'},

{
  id:'signature',ch:3,year:2020,who:'Terry Lyons',name:'Signature Methods',
  desc:'Ekstraksi fitur topologis menggunakan iterated integral dari jalur harga — representasi kompak yang menangkap "bentuk" seluruh lintasan untuk machine learning keuangan.',
  tex:'S(X)_{s,t}^I = \\int_{s<t_1<\\cdots<t_k<t} dX^{i_1}\\cdots dX^{i_k}',
  vars:[
    {k:'drift',label:'Drift Harga (%/th)',min:-20,max:20,step:1,def:8,unit:'%'},
    {k:'vol',label:'Volatilitas',min:5,max:50,step:1,def:20,unit:'%'},
    {k:'T',label:'Horizon (T)',min:0.1,max:2,step:0.1,def:1,unit:' th'}
  ],
  stochastic:true,
  calc(v,rng){
    const steps=80,dt=v.T/steps; const path=[[0,0]]; let lnS=0;
    for(let i=0;i<steps;i++){
      const z=gaussRNG(rng);
      lnS+=(v.drift/100-0.5*(v.vol/100)**2)*dt+(v.vol/100)*Math.sqrt(dt)*z;
      path.push([i*dt,lnS]);
    }
    let sig1x=0,sig1y=0,sig2xy=0;
    for(let i=1;i<path.length;i++){
      const dx=path[i][0]-path[i-1][0];
      const dy=path[i][1]-path[i-1][1];
      sig2xy+=sig1x*dy; sig1x+=dx; sig1y+=dy;
    }
    const pts=path.map(p=>({x:p[0],y:Math.exp(p[1])*100}));
    return {
      big:fmtNum(sig2xy,4),bigUnit:'',bigLabel:'Signature s¹²₂ (Cross-Term)',
      subs:[{l:'Fitur Level 1 (∫dX)',v:fmtNum(sig1x,4)},{l:'Fitur Level 1 (∫dY)',v:fmtNum(sig1y,4)}],
      note:{type:'info',text:'Iterated integral s¹² menangkap area bertanda antara komponen waktu dan harga — non-trivial bahkan untuk path dengan return akhir yang sama.'},
      chart:{xMin:0,xMax:v.T,yMin:Math.min(...pts.map(p=>p.y))*0.9,yMax:Math.max(...pts.map(p=>p.y))*1.1,series:[{label:'Lintasan Harga (Path)',color:COLORS.violet,pts}]}
    };
  }
}
